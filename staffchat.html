<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #eef2f3;
}

/* Welcome */
#welcome {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #006837, #0b3d2e);
  color: white;
}

#welcome h1 {
  color: #FFD700;
}

#name-input {
  padding: 12px;
  border-radius: 25px;
  border: none;
  width: 250px;
  margin: 10px 0;
}

#enter-btn {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: #FFD700;
  color: #006837;
  cursor: pointer;
  font-weight: bold;
}

/* Chat Container */
#chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 600px;
  margin: auto;
  background: white;
}

/* Messages */
#messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Message Bubble */
.message {
  padding: 8px 12px;
  border-radius: 14px;
  max-width: 75%;
  font-size: 14px;
  line-height: 1.3;
  word-wrap: break-word;
}

.user {
  align-self: flex-end;
  background: #006837;
  color: white;
}

.other {
  align-self: flex-start;
  background: #FFD700;
  color: #006837;
}

/* Meta */
.meta {
  font-size: 10px;
  opacity: 0.6;
  margin-bottom: 2px;
}

/* Input */
#input-container {
  display: flex;
  border-top: 1px solid #ddd;
}

#message-input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

#send-btn {
  padding: 0 16px;
  border: none;
  background: #006837;
  color: white;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<div id="welcome">
  <h1>YLC 2026 Chat</h1>
  <input id="name-input" placeholder="Enter your name">
  <button id="enter-btn">Enter Chat</button>
</div>

<div id="chat-container" class="hidden">
  <div id="messages"></div>

  <div id="input-container">
    <input id="message-input" placeholder="Type a message">
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxW-NPWH7jFPHNBdajW3Kz8w9XWpaIw1THhJqEaYl-A1g9F_NJA1BfQeb7Nvl_eleiJ/exec";

let userName = "";
let lastMessageCount = 0;

/* Enter Chat */
document.getElementById("enter-btn").onclick = () => {
  const name = document.getElementById("name-input").value.trim();
  if (!name) return alert("Enter name");

  userName = name;
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("chat-container").classList.remove("hidden");

  loadMessages();
};

/* Send Message */
async function sendMessage() {
  const input = document.getElementById("message-input");
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  await fetch(`${WEB_APP_URL}?action=send&user=${encodeURIComponent(userName)}&message=${encodeURIComponent(msg)}`);

  loadMessages();
}

/* Format Time */
function formatTime(date) {
  return new Date(date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/* Load Messages */
async function loadMessages() {
  try {
    const res = await fetch(WEB_APP_URL + "?action=get");
    const data = await res.json();

    const box = document.getElementById("messages");

    // Prevent full redraw if same length
    if (data.length === lastMessageCount) return;
    lastMessageCount = data.length;

    box.innerHTML = "";

    data.forEach(m => {
      const div = document.createElement("div");
      div.className = "message " + (m.user === userName ? "user" : "other");

      div.innerHTML = `
        <div class="meta">${m.user} • ${formatTime(m.time || Date.now())}</div>
        ${m.message}
      `;

      box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;

  } catch (err) {
    console.error("Error loading messages", err);
  }
}

/* Events */
document.getElementById("send-btn").onclick = sendMessage;

document.getElementById("message-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

/* Auto Refresh */
setInterval(() => {
  if (userName) loadMessages();
}, 2000);
</script>

</body>
</html>
