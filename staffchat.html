<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>
<style>
  /* Global Styles */
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    height: 100%;
    background: #f9f9f9;
  }
  .hidden { display: none; }

  /* Welcome Screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: linear-gradient(135deg, #006837, #f9f9f9);
    text-align: center;
    padding: 20px;
    color: white;
  }
  #welcome h1 {
    font-size: 2.5rem;
    margin-bottom: 20px;
    color: #FFD700;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  }
  #name-input {
    padding: 14px;
    font-size: 1rem;
    border-radius: 25px;
    border: none;
    width: 280px;
    margin-bottom: 15px;
    outline: none;
  }
  #enter-btn {
    padding: 12px 25px;
    background: #FFD700;
    color: #006837;
    font-weight: bold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  }
  #enter-btn:hover {
    background: #e6c200;
    transform: translateY(-2px);
  }

  /* Chat Container */
  #chat-container {
    display: flex;
    flex-direction: column;
    max-width: 700px;
    margin: 0 auto;
    height: 100vh;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    background: #fff;
  }

  /* Messages */
  #messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f0f2f5;
  }
  .message {
    margin-bottom: 12px;
    max-width: 70%;
    padding: 12px 18px;
    border-radius: 20px;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease-in;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .message.user {
    background: #006837;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
  }
  .message.other {
    background: #FFD700;
    color: #006837;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
  }
  .meta {
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 5px;
  }

  /* Input Area */
  #input-container {
    display: flex;
    border-top: 1px solid #ddd;
    background: white;
  }
  #message-input {
    flex: 1;
    padding: 15px;
    border: none;
    font-size: 1rem;
    outline: none;
    border-radius: 0;
  }
  #send-btn {
    padding: 15px 25px;
    background: #006837;
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: 0.3s;
  }
  #send-btn:hover { background: #004f28; }
</style>
</head>
<body>

<!-- Welcome Screen -->
<div id="welcome">
  <h1>YLC 2026 Public Chat</h1>
  <input type="text" id="name-input" placeholder="Enter your name" />
  <button id="enter-btn">Enter Chat</button>
</div>

<!-- Chat Screen -->
<div id="chat-container" class="hidden">
  <div id="messages"></div>
  <div id="input-container">
    <input type="text" id="message-input" placeholder="Type a message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxW-NPWH7jFPHNBdajW3Kz8w9XWpaIw1THhJqEaYl-A1g9F_NJA1BfQeb7Nvl_eleiJ/exec';
let userName = "";

// Enter name
document.getElementById('enter-btn').addEventListener('click', () => {
  const input = document.getElementById('name-input').value.trim();
  if(!input) return alert("Please enter your name!");
  userName = input;
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('chat-container').classList.remove('hidden');
  loadMessages();
});

// Send message
async function sendMessage() {
  const messageInput = document.getElementById('message-input');
  const message = messageInput.value.trim();
  if(!message) return;
  await fetch(`${WEB_APP_URL}?action=send&user=${encodeURIComponent(userName)}&message=${encodeURIComponent(message)}`);
  messageInput.value = "";
  loadMessages();
}

// Load messages
async function loadMessages() {
  try {
    const res = await fetch(`${WEB_APP_URL}?action=get`);
    const data = await res.json();
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML = '';
    data.forEach(msg => {
      const div = document.createElement('div');
      div.classList.add('message', msg.user === userName ? 'user' : 'other');
      div.innerHTML = `<div class="meta">${msg.user} • ${new Date(msg.timestamp).toLocaleTimeString()}</div>${msg.message}`;
      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  } catch(err) {
    console.error("Error loading messages:", err);
  }
}

// Event listeners
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('message-input').addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

// Auto-refresh
setInterval(() => { if(userName) loadMessages(); }, 2000);
</script>

</body>
</html>
