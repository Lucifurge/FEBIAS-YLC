<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC Staff Chat</title>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
:root{
  --bg:#0b0b0f;
  --panel:#15151c;
  --panel2:#1c1c26;
  --accent:#ff4d00;
  --text:#fff;
  --muted:#a1a1aa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#000,#1a0a00);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#login-box{
  background:var(--panel);
  padding:25px;
  border-radius:14px;
  width:300px;
  text-align:center;
}

#login-box h1{
  color:var(--accent);
  margin-bottom:10px;
}

#login-box input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:var(--panel2);
  color:white;
}

#login-box button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* SIDEBAR */
#sidebar{
  width:70px;
  background:#0a0a0d;
  display:flex;
  justify-content:center;
  padding:10px;
}

.server{
  width:45px;
  height:45px;
  background:var(--accent);
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header{
  height:50px;
  background:var(--panel);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

/* CALL */
#call-btn{
  background:var(--accent);
  border:none;
  padding:7px 12px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* VIDEO SECTION */
#video-section{
  display:none;
  background:#000;
  padding:10px;
}

#videos{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.video-box{
  width:180px;
  height:140px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

/* CONTROLS */
#controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.ctrl{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:var(--panel2);
  color:white;
  cursor:pointer;
}

.ctrl.active{
  background:var(--accent);
}

/* CHAT */
#messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  background:var(--panel2);
}

.me{
  background:var(--accent);
  align-self:flex-end;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:var(--panel);
}

#msg{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0f0f14;
  color:white;
}

#send{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="login-box">
    <h1>STAFF CHAT</h1>
    <input id="name" placeholder="Enter name">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="server">Y</div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="header">
    <span># staff-room</span>
    <button id="call-btn" onclick="toggleCall()">📞 Call</button>
  </div>

  <!-- VIDEO -->
  <div id="video-section">

    <div id="videos"></div>

    <div id="controls">
      <button id="micBtn" class="ctrl" onclick="toggleMic()">🎤 Mic</button>
      <button id="camBtn" class="ctrl" onclick="toggleCam()">📷 Cam</button>
      <button class="ctrl" onclick="leaveCall()">🚪 Leave</button>
    </div>

  </div>

  <!-- CHAT -->
  <div id="messages"></div>

  <div id="input">
    <input id="msg" placeholder="Message...">
    <button id="send" onclick="send()">Send</button>
  </div>

</div>

<script>

const APP_ID = "81cc7072a40b4f14a790848d6035888a";
const CHANNEL = "ylc-room";

let name = "";

let client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });

let localAudio = null;
let localVideo = null;

let micOn = true;
let camOn = true;

/* LOGIN */
function enter(){
  name = document.getElementById("name").value.trim();
  if(!name) return;
  document.getElementById("login").style.display="none";
}

/* CALL UI */
function toggleCall(){
  const v = document.getElementById("video-section");
  v.style.display = v.style.display === "block" ? "none" : "block";
}

/* JOIN */
async function join(){
  await client.join(APP_ID, CHANNEL, null, null);

  const tracks = await AgoraRTC.createMicrophoneAndCameraTracks();
  localAudio = tracks[0];
  localVideo = tracks[1];

  const box = document.createElement("div");
  box.className = "video-box";
  document.getElementById("videos").appendChild(box);

  localVideo.play(box);

  await client.publish([localAudio, localVideo]);

  client.on("user-published", async (user, type) => {
    await client.subscribe(user, type);

    let el = document.getElementById("u-"+user.uid);
    if(!el){
      el = document.createElement("div");
      el.id = "u-"+user.uid;
      el.className = "video-box";
      document.getElementById("videos").appendChild(el);
    }

    if(type === "video") user.videoTrack.play(el);
    if(type === "audio") user.audioTrack.play();
  });
}

/* LEAVE */
async function leaveCall(){
  if(localAudio){ localAudio.close(); }
  if(localVideo){ localVideo.close(); }

  await client.leave();

  document.getElementById("videos").innerHTML = "";
}

/* 🔥 FIXED MIC TOGGLE */
async function toggleMic(){

  if(!localAudio) return;

  micOn = !micOn;
  await localAudio.setEnabled(micOn);

  document.getElementById("micBtn").classList.toggle("active", micOn);
}

/* 🔥 FIXED CAM TOGGLE */
async function toggleCam(){

  if(!localVideo) return;

  camOn = !camOn;
  await localVideo.setEnabled(camOn);

  document.getElementById("camBtn").classList.toggle("active", camOn);
}

/* CHAT */
function send(){
  const input = document.getElementById("msg");
  if(!input.value) return;

  const div = document.createElement("div");
  div.className = "message me";
  div.textContent = name + ": " + input.value;

  document.getElementById("messages").appendChild(div);
  input.value="";
}

</script>

</body>
</html>
