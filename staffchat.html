<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
:root{
  --bg:#0b0b0f;
  --panel:#15151c;
  --panel2:#1c1c26;
  --orange:#ff4d00;
  --white:#ffffff;
  --gray:#a1a1aa;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  background:var(--bg);
  height:100vh;
  display:flex;
  color:var(--white);
}

/* LOGIN */
#login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#000,#1a0a00);
  z-index:999;
}

#login-box{
  background:var(--panel);
  padding:30px;
  border-radius:16px;
  width:320px;
  text-align:center;
  border:1px solid rgba(255,77,0,0.2);
}

#login h1{
  color:var(--orange);
  margin-bottom:15px;
}

#name-input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:var(--panel2);
  color:white;
}

#enter-btn{
  width:100%;
  padding:12px;
  background:var(--orange);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* SIDEBAR */
#sidebar{
  width:70px;
  background:#0a0a0d;
  display:flex;
  justify-content:center;
  padding:10px;
}

.server{
  width:50px;
  height:50px;
  border-radius:14px;
  background:var(--orange);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header{
  height:52px;
  background:var(--panel);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  border-bottom:1px solid #222;
}

/* CALL BUTTON */
#call-btn{
  background:var(--orange);
  border:none;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* VIDEO */
#video-section{
  display:none;
  background:#000;
  padding:10px;
  border-bottom:1px solid #222;
}

#videos{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* CONTROLS */
#call-controls{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.ctrl{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--panel2);
  color:white;
}

.ctrl.active{
  background:var(--orange);
}

/* CHAT */
#messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message{
  max-width:70%;
  padding:10px 14px;
  border-radius:14px;
  background:var(--panel2);
  animation:pop .15s ease;
}

@keyframes pop{
  from{transform:scale(.95);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.user{
  align-self:flex-end;
  background:var(--orange);
}

.other{
  align-self:flex-start;
}

/* INPUT */
#input-container{
  display:flex;
  padding:10px;
  background:var(--panel);
  border-top:1px solid #222;
}

#message-input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0f0f14;
  color:white;
}

#send-btn{
  margin-left:10px;
  padding:12px 16px;
  background:var(--orange);
  border:none;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="login-box">
    <h1>YLC CHAT</h1>
    <input id="name-input" placeholder="Enter your name">
    <button id="enter-btn">Enter</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="server">Y</div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="header">
    <span># YLC Chat</span>
    <button id="call-btn" onclick="toggleVideo()">📞 Call</button>
  </div>

  <div id="video-section">
    <div id="videos"></div>

    <button onclick="joinCall()" class="ctrl">Join</button>
    <button onclick="leaveCall()" class="ctrl">Leave</button>

    <div id="call-controls">
      <button id="micBtn" class="ctrl" onclick="toggleMic()">🎤 Mic</button>
      <button id="camBtn" class="ctrl" onclick="toggleCam()">📷 Cam</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-container">
    <input id="message-input" placeholder="Message...">
    <button id="send-btn">Send</button>
  </div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTk_7LRdKUpUywWIuWlzgnTanUy2E-Ob-Caa_t5Do87MiKU602Kz_vQ0bZozgJ7rQB/exec";
const APP_ID = "81cc7072a40b4f14a790848d6035888a";
const CHANNEL = "ylc-room";

let userName = "";
let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

let localTracks = {
  audio: null,
  video: null
};

let remoteUsers = {};

/* ================= LOGIN ================= */
document.getElementById("enter-btn").onclick = () => {
  const n = document.getElementById("name-input").value.trim();
  if (!n) return;

  userName = n;
  document.getElementById("login").style.display = "none";
  loadMessages();
};

/* ================= CHAT ================= */
async function loadMessages() {
  const res = await fetch(`${WEB_APP_URL}?action=get`);
  const data = await res.json();

  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "message " + (m.user === userName ? "user" : "other");
    div.innerText = `${m.user}: ${m.message}`;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("message-input");
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  await fetch(`${WEB_APP_URL}?action=send&user=${userName}&message=${msg}`);
  loadMessages();
}

document.getElementById("send-btn").onclick = sendMessage;

/* ================= VIDEO CALL ================= */
async function joinCall() {
  await client.join(APP_ID, CHANNEL, null, null);

  const [micTrack, camTrack] =
    await AgoraRTC.createMicrophoneAndCameraTracks();

  localTracks.audio = micTrack;
  localTracks.video = camTrack;

  /* LOCAL VIDEO */
  const localBox = document.createElement("div");
  localBox.id = "local-player";
  localBox.style.width = "200px";
  localBox.style.height = "150px";
  document.getElementById("videos").appendChild(localBox);

  camTrack.play(localBox);

  await client.publish([micTrack, camTrack]);

  /* ================= REMOTE USERS ================= */
  client.on("user-published", async (user, mediaType) => {
    await client.subscribe(user, mediaType);

    if (!remoteUsers[user.uid]) {
      const container = document.createElement("div");
      container.id = "remote-" + user.uid;
      container.style.width = "200px";
      container.style.height = "150px";
      container.style.background = "#111";
      container.style.borderRadius = "10px";
      container.style.overflow = "hidden";

      document.getElementById("videos").appendChild(container);

      remoteUsers[user.uid] = { container };
    }

    if (mediaType === "video") {
      user.videoTrack.play(remoteUsers[user.uid].container);
    }

    if (mediaType === "audio") {
      user.audioTrack.play();
    }
  });

  client.on("user-unpublished", (user) => {
    const el = document.getElementById("remote-" + user.uid);
    if (el) el.remove();
    delete remoteUsers[user.uid];
  });
}

/* ================= LEAVE ================= */
async function leaveCall() {
  Object.values(localTracks).forEach(t => {
    if (t) {
      t.stop();
      t.close();
    }
  });

  localTracks = { audio: null, video: null };

  await client.leave();

  document.getElementById("videos").innerHTML = "";
  remoteUsers = {};
}

/* ================= MIC TOGGLE ================= */
async function toggleMic() {
  const mic = localTracks.audio;
  if (!mic) return;

  if (mic.enabled) {
    await mic.setEnabled(false);
    micBtn.classList.remove("active");
  } else {
    await mic.setEnabled(true);
    micBtn.classList.add("active");
  }
}

/* ================= CAMERA TOGGLE ================= */
async function toggleCam() {
  const cam = localTracks.video;
  if (!cam) return;

  if (cam.enabled) {
    await cam.setEnabled(false);
    camBtn.classList.remove("active");
  } else {
    await cam.setEnabled(true);
    camBtn.classList.add("active");
  }
}

/* ================= UI ================= */
function toggleVideo() {
  const v = document.getElementById("video-section");
  v.style.display = v.style.display === "block" ? "none" : "block";
}

/* AUTO REFRESH CHAT */
setInterval(() => {
  if (userName) loadMessages();
}, 2000);
</script>

</body>
</html>
