<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI",sans-serif; }

/* ===== LOGIN SCREEN ===== */
#login {
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#0b0f0c,#1e1f22);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:999;
}

#login-box {
  background:#2b2d31;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#login h1 {
  color:#ff5a1f;
  margin-bottom:15px;
}

#name-input {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
  background:#1e1f22;
  color:white;
}

#enter-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#006837;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* ===== APP ===== */
body {
  background:#1e1f22;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width:70px;
  background:#111214;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
}

.server {
  width:50px;
  height:50px;
  background:#006837;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
}

/* MAIN */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header {
  height:50px;
  background:#2b2d31;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  color:white;
}

/* VIDEO */
#video-section {
  display:none;
  background:#000;
  padding:10px;
}

#videos {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* CHAT */
#messages {
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  display:flex;
  flex-direction:column;
  max-width:70%;
}

.user { align-self:flex-end; }
.other { align-self:flex-start; }

.meta {
  font-size:11px;
  opacity:0.6;
  margin-bottom:3px;
  color:#aaa;
}

.bubble {
  padding:10px 14px;
  border-radius:16px;
  font-size:14px;
}

.user .bubble {
  background:#ff5a1f;
  color:white;
}

.other .bubble {
  background:#2b2d31;
  color:white;
}

/* INPUT */
#input-container {
  display:flex;
  padding:10px;
  background:#2b2d31;
}

#message-input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e1f22;
  color:white;
}

#send-btn {
  margin-left:10px;
  padding:12px 16px;
  border:none;
  background:#006837;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="login-box">
    <h1>YLC CHAT</h1>
    <input id="name-input" placeholder="Enter your name">
    <button id="enter-btn">Enter Chat</button>
  </div>
</div>

<!-- APP -->
<div id="sidebar">
  <div class="server">Y</div>
</div>

<div id="main">

  <div id="header">
    <span># YLC Chat</span>
    <button onclick="toggleVideo()">📞 Call</button>
  </div>

  <div id="video-section">
    <div id="videos"></div>
    <button onclick="joinCall()">Join Call</button>
    <button onclick="leaveCall()">Leave Call</button>
  </div>

  <div id="messages"></div>

  <div id="input-container">
    <input id="message-input" placeholder="Message YLC...">
    <button id="send-btn">Send</button>
  </div>

</div>

<script>
/* ================= CONFIG ================= */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTk_7LRdKUpUywWIuWlzgnTanUy2E-Ob-Caa_t5Do87MiKU602Kz_vQ0bZozgJ7rQB/exec";
const APP_ID = "81cc7072a40b4f14a790848d6035888a";
const CHANNEL = "ylc-room";

/* ================= USER SYSTEM ================= */
let userName = "";

document.getElementById("enter-btn").onclick = () => {
  const name = document.getElementById("name-input").value.trim();
  if (!name) return alert("Enter your name!");

  userName = name;

  document.getElementById("login").style.display = "none";
  loadMessages();
};

/* ================= CHAT ================= */
function renderMessages(data){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.sort((a,b)=>Number(a.time)-Number(b.time));

  data.forEach(m=>{
    if(!m.message) return;

    const div = document.createElement("div");
    div.className = "message " + (m.user===userName?"user":"other");

    div.innerHTML = `
      <div class="meta">${m.user}</div>
      <div class="bubble">${m.message}</div>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

async function loadMessages(){
  const res = await fetch(`${WEB_APP_URL}?action=get`);
  const data = await res.json();
  renderMessages(data);
}

async function sendMessage(){
  const input = document.getElementById("message-input");
  const msg = input.value.trim();
  if(!msg) return;

  input.value = "";

  await fetch(`${WEB_APP_URL}?action=send&user=${encodeURIComponent(userName)}&message=${encodeURIComponent(msg)}`);
  loadMessages();
}

document.getElementById("send-btn").onclick = sendMessage;
document.getElementById("message-input").addEventListener("keydown", e=>{
  if(e.key==="Enter") sendMessage();
});

setInterval(()=>{ if(userName) loadMessages(); }, 2000);

/* ================= VIDEO ================= */
let client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });
let localTracks = [];

async function joinCall(){
  await client.join(APP_ID, CHANNEL, null, null);

  localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

  const player = document.createElement("div");
  player.style.width = "200px";
  player.style.height = "150px";
  document.getElementById("videos").appendChild(player);

  localTracks[1].play(player);
  await client.publish(localTracks);

  client.on("user-published", async (user, mediaType)=>{
    await client.subscribe(user, mediaType);

    const remote = document.createElement("div");
    remote.style.width = "200px";
    remote.style.height = "150px";
    document.getElementById("videos").appendChild(remote);

    if(mediaType==="video") user.videoTrack.play(remote);
    if(mediaType==="audio") user.audioTrack.play();
  });
}

async function leaveCall(){
  localTracks.forEach(t=>t.stop());
  localTracks.forEach(t=>t.close());
  await client.leave();
  document.getElementById("videos").innerHTML="";
}

function toggleVideo(){
  const v = document.getElementById("video-section");
  v.style.display = v.style.display==="none"?"block":"none";
}
</script>

</body>
</html>
