<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>
<style>
  body, html {
    margin:0; padding:0; height:100%; font-family: Arial, sans-serif; background: #f0f2f5;
    overflow: hidden;
  }
  .hidden { display:none; }

  /* Welcome Screen */
  #welcome {
    position: absolute; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction: column; justify-content:center; align-items:center;
    background: linear-gradient(135deg, #006837, #f9f9f9);
    color:white; text-align:center; transition: all 0.5s ease;
  }
  #welcome h1 {
    font-size: 3rem; margin-bottom: 25px; color:#FFD700; text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  }
  #name-input {
    padding: 15px 20px; font-size: 1rem; border-radius: 25px; border:none;
    width: 280px; margin-bottom:20px; outline:none; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  #enter-btn {
    padding: 12px 25px; background:#FFD700; color:#006837; font-weight:bold; border:none;
    border-radius:25px; cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.2); transition:0.3s;
  }
  #enter-btn:hover { background:#e6c200; transform:translateY(-2px); }

  /* Chat Screen */
  #chat-container {
    display: flex; flex-direction: column; max-width: 700px; margin: 0 auto;
    height: 100vh; border-radius:15px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,0.15);
    background:#fff; opacity:0; transform: translateY(50px); transition: all 0.5s ease;
  }
  #chat-container.show { opacity:1; transform: translateY(0); }

  /* Messages */
  #messages {
    flex:1; padding:20px; overflow-y:auto; background:#f0f2f5;
  }
  .message {
    margin-bottom:12px; max-width:70%; padding:12px 18px; border-radius:20px;
    word-wrap:break-word; animation: fadeIn 0.3s ease-in; box-shadow:0 2px 5px rgba(0,0,0,0.1);
  }
  .message.user { background:#006837; color:white; align-self:flex-end; border-bottom-right-radius:5px; }
  .message.other { background:#FFD700; color:#006837; align-self:flex-start; border-bottom-left-radius:5px; }
  .meta { font-size:0.75rem; color:#555; margin-bottom:5px; }

  @keyframes fadeIn { from {opacity:0} to {opacity:1} }

  /* Input */
  #input-container { display:flex; border-top:1px solid #ddd; background:white; }
  #message-input { flex:1; padding:15px; font-size:1rem; border:none; outline:none; }
  #send-btn { padding:15px 25px; background:#006837; color:white; font-weight:bold; border:none; cursor:pointer; transition:0.3s; }
  #send-btn:hover { background:#004f28; }

  /* Scrollbar styling */
  #messages::-webkit-scrollbar { width:8px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius:4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- Welcome Screen -->
<div id="welcome">
  <h1>YLC 2026 Chat</h1>
  <input type="text" id="name-input" placeholder="Enter your name" />
  <button id="enter-btn">Enter Chat</button>
</div>

<!-- Chat Screen -->
<div id="chat-container">
  <div id="messages"></div>
  <div id="input-container">
    <input type="text" id="message-input" placeholder="Type a message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxW-NPWH7jFPHNBdajW3Kz8w9XWpaIw1THhJqEaYl-A1g9F_NJA1BfQeb7Nvl_eleiJ/exec';
let userName = "";

// Enter name
document.getElementById('enter-btn').addEventListener('click', () => {
  const input = document.getElementById('name-input').value.trim();
  if(!input) return alert("Please enter your name!");
  userName = input;

  // Hide welcome and show chat
  document.getElementById('welcome').style.opacity='0';
  document.getElementById('welcome').style.transform='translateY(-50px)';
  setTimeout(()=>{ document.getElementById('welcome').classList.add('hidden'); }, 500);

  document.getElementById('chat-container').classList.add('show');
  loadMessages();
});

// Send message
async function sendMessage(){
  const input = document.getElementById('message-input');
  const message = input.value.trim();
  if(!message) return;
  await fetch(`${WEB_APP_URL}?action=send&user=${encodeURIComponent(userName)}&message=${encodeURIComponent(message)}`);
  input.value='';
  loadMessages();
}

// Load messages
async function loadMessages(){
  try{
    const res = await fetch(`${WEB_APP_URL}?action=get`);
    const data = await res.json();
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML='';
    data.forEach(msg=>{
      const div = document.createElement('div');
      div.classList.add('message', msg.user===userName?'user':'other');
      div.innerHTML=`<div class="meta">${msg.user} • ${new Date(msg.timestamp).toLocaleTimeString()}</div>${msg.message}`;
      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  } catch(err){ console.error('Error loading messages:', err); }
}

// Event listeners
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('message-input').addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(); });

// Auto-refresh
setInterval(()=>{ if(userName) loadMessages(); }, 2000);
</script>
</body>
</html>
