<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:"Segoe UI",Arial,sans-serif; background:#eef2f3; height:100vh; display:flex; justify-content:center; align-items:center; }

/* Welcome */
#welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; max-width:400px; padding:20px; background:linear-gradient(135deg,#006837,#0b3d2e); border-radius:12px; color:white; text-align:center; }
#welcome h1 { color:#FFD700; margin-bottom:20px; }
#name-input { width:100%; padding:12px; border-radius:25px; border:none; margin-bottom:12px; }
#enter-btn { width:100%; padding:12px; border-radius:25px; border:none; background:#FFD700; color:#006837; font-weight:bold; cursor:pointer; }

/* Chat */
#chat-container { display:flex; flex-direction:column; height:80vh; max-width:600px; width:100%; background:white; border-radius:12px; overflow:hidden; display:none; }
#messages { flex:1; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.message { padding:8px 12px; border-radius:14px; max-width:75%; font-size:14px; word-wrap:break-word; }
.user { align-self:flex-end; background:#006837; color:white; }
.other { align-self:flex-start; background:#FFD700; color:#006837; }
.meta { font-size:10px; opacity:0.6; margin-bottom:2px; }

/* Input */
#input-container { display:flex; border-top:1px solid #ddd; }
#message-input { flex:1; padding:12px; border:none; outline:none; }
#send-btn { padding:0 16px; border:none; background:#006837; color:white; cursor:pointer; }
</style>
</head>
<body>

<div id="welcome">
  <h1>YLC 2026 Chat</h1>
  <input id="name-input" placeholder="Enter your name">
  <button id="enter-btn">Enter Chat</button>
</div>

<div id="chat-container">
  <div id="messages"></div>
  <div id="input-container">
    <input id="message-input" placeholder="Type a message">
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbww0gXereWPMMtGwi2y6-vy7uPtyRaLSm-9DLcftYSzZXiAgp4ddXymaa39MOIzPfkW/exec";
let userName = "";

/* Format time safely */
function formatTime(ts) {
  if (!ts) return "";
  const d = new Date(Number(ts));
  return isNaN(d) ? "" : d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

/* Render messages */
function renderMessages(data) {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  if (!data || data.length === 0) {
    box.innerHTML = "<div style='text-align:center; opacity:0.5;'>No messages yet</div>";
    return;
  }

  data.forEach(m => {
    if (!m.message) return; // skip empty rows

    const div = document.createElement("div");
    div.className = "message " + (m.user === userName ? "user" : "other");

    div.innerHTML = `
      <div class="meta">${m.user} • ${formatTime(m.time)}</div>
      ${m.message}
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* Load messages */
async function loadMessages() {
  try {
    const res = await fetch(`${WEB_APP_URL}?action=get`);
    const data = await res.json();

    // Sort by time (IMPORTANT)
    data.sort((a, b) => Number(a.time) - Number(b.time));

    renderMessages(data);

  } catch (err) {
    console.log("Load failed:", err);
  }
}

/* Send message */
async function sendMessage() {
  const input = document.getElementById("message-input");
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  try {
    await fetch(`${WEB_APP_URL}?action=send&user=${encodeURIComponent(userName)}&message=${encodeURIComponent(msg)}`);
  } catch (err) {
    console.log("Send failed:", err);
  }

  // reload immediately after sending
  loadMessages();
}

/* Enter chat */
document.getElementById("enter-btn").onclick = async () => {
  const name = document.getElementById("name-input").value.trim();
  if (!name) return alert("Enter your name");

  userName = name;

  document.getElementById("welcome").style.display = "none";
  document.getElementById("chat-container").style.display = "flex";

  document.getElementById("message-input").focus();

  // 🔥 LOAD IMMEDIATELY
  await loadMessages();
};

/* Events */
document.getElementById("send-btn").onclick = sendMessage;

document.getElementById("message-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

/* Auto refresh */
setInterval(() => {
  if (userName) loadMessages();
}, 2000);
</script>

</script>
</body>
</html>
