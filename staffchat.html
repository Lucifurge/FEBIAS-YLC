<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Chat</title>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI",sans-serif; }

/* ===== LOGIN ===== */
#login {
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#0b0f0c,#1e1f22);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#login-box {
  width:320px;
  padding:30px;
  border-radius:16px;
  background:#2b2d31;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
  border:1px solid rgba(255,90,31,0.2);
}

#login h1 {
  color:#ff5a1f;
  margin-bottom:15px;
}

#name-input {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:12px;
  background:#1e1f22;
  color:white;
  outline:none;
}

#enter-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#006837;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#enter-btn:hover {
  background:#ff5a1f;
}

/* ===== APP ===== */
body {
  background:#1e1f22;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width:70px;
  background:#111214;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
}

.server {
  width:50px;
  height:50px;
  background:#006837;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
}

/* MAIN */
#main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header {
  height:52px;
  background:#2b2d31;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  color:white;
}

/* CALL BUTTON */
#call-btn {
  background:#006837;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

#call-btn.active {
  background:#ff5a1f;
  box-shadow:0 0 12px #ff5a1f;
}

/* VIDEO */
#video-section {
  display:none;
  background:#000;
  padding:10px;
}

#videos {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* VOICE CONTROLS */
#mic-btn, #cam-btn {
  background:#2b2d31;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

#mic-btn.active, #cam-btn.active {
  background:#ff5a1f;
  box-shadow:0 0 10px #ff5a1f;
}

/* CHAT */
#messages {
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  display:flex;
  flex-direction:column;
  max-width:70%;
}

.user { align-self:flex-end; }
.other { align-self:flex-start; }

.meta {
  font-size:11px;
  opacity:0.6;
  margin-bottom:3px;
  color:#aaa;
}

.bubble {
  padding:10px 14px;
  border-radius:14px;
}

.user .bubble {
  background:#ff5a1f;
  color:white;
}

.other .bubble {
  background:#2b2d31;
  color:white;
  border:1px solid #111;
}

/* INPUT */
#input-container {
  display:flex;
  padding:10px;
  background:#2b2d31;
}

#message-input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e1f22;
  color:white;
}

#send-btn {
  margin-left:10px;
  padding:12px 16px;
  border:none;
  background:#006837;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="login-box">
    <h1>YLC CHAT</h1>
    <input id="name-input" placeholder="Enter your name">
    <button id="enter-btn">Enter Chat</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="server">Y</div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="header">
    <span># YLC Chat</span>
    <button id="call-btn" onclick="toggleVideo()">📞 Call</button>
  </div>

  <!-- VIDEO -->
  <div id="video-section">

    <div id="videos"></div>

    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
      <button onclick="joinCall()">Join Call</button>
      <button onclick="leaveCall()">Leave Call</button>

      <button id="mic-btn" onclick="toggleMic()">🎤 Mic</button>
      <button id="cam-btn" onclick="toggleCam()">📷 Cam</button>
    </div>

  </div>

  <!-- CHAT -->
  <div id="messages"></div>

  <div id="input-container">
    <input id="message-input" placeholder="Message YLC...">
    <button id="send-btn">Send</button>
  </div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTk_7LRdKUpUywWIuWlzgnTanUy2E-Ob-Caa_t5Do87MiKU602Kz_vQ0bZozgJ7rQB/exec";
const APP_ID = "81cc7072a40b4f14a790848d6035888a";
const CHANNEL = "ylc-room";

let userName = "";

/* LOGIN */
document.getElementById("enter-btn").onclick = () => {
  const name = document.getElementById("name-input").value.trim();
  if (!name) return alert("Enter your name!");

  userName = name;
  document.getElementById("login").style.display = "none";
  loadMessages();
};

/* CHAT */
function renderMessages(data){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.sort((a,b)=>Number(a.time)-Number(b.time));

  data.forEach(m=>{
    if(!m.message) return;

    const div = document.createElement("div");
    div.className = "message " + (m.user===userName?"user":"other");

    div.innerHTML = `
      <div class="meta">${m.user}</div>
      <div class="bubble">${m.message}</div>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

async function loadMessages(){
  const res = await fetch(`${WEB_APP_URL}?action=get`);
  const data = await res.json();
  renderMessages(data);
}

async function sendMessage(){
  const input = document.getElementById("message-input");
  const msg = input.value.trim();
  if(!msg) return;

  input.value = "";

  await fetch(`${WEB_APP_URL}?action=send&user=${encodeURIComponent(userName)}&message=${encodeURIComponent(msg)}`);
  loadMessages();
}

document.getElementById("send-btn").onclick = sendMessage;
document.getElementById("message-input").addEventListener("keydown", e=>{
  if(e.key==="Enter") sendMessage();
});

setInterval(()=>{ if(userName) loadMessages(); }, 2000);

/* ===== VIDEO (AGORA) ===== */
let client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });
let localTracks = [];

let micOn = true;
let camOn = true;

/* JOIN */
async function joinCall(){
  await client.join(APP_ID, CHANNEL, null, null);

  localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

  const player = document.createElement("div");
  player.style.width = "200px";
  player.style.height = "150px";
  document.getElementById("videos").appendChild(player);

  localTracks[1].play(player);
  await client.publish(localTracks);

  client.on("user-published", async (user, mediaType)=>{
    await client.subscribe(user, mediaType);

    const remote = document.createElement("div");
    remote.style.width = "200px";
    remote.style.height = "150px";
    document.getElementById("videos").appendChild(remote);

    if(mediaType==="video") user.videoTrack.play(remote);
    if(mediaType==="audio") user.audioTrack.play();
  });
}

/* LEAVE */
async function leaveCall(){
  localTracks.forEach(t=>t.stop());
  localTracks.forEach(t=>t.close());
  await client.leave();
  document.getElementById("videos").innerHTML="";
}

/* TOGGLE UI */
function toggleVideo(){
  const v = document.getElementById("video-section");
  const btn = document.getElementById("call-btn");

  if(v.style.display === "none" || v.style.display === ""){
    v.style.display = "block";
    btn.classList.add("active");
  } else {
    v.style.display = "none";
    btn.classList.remove("active");
  }
}

/* MIC */
function toggleMic(){
  if(!localTracks[0]) return;

  micOn = !micOn;
  localTracks[0].setEnabled(micOn);

  const btn = document.getElementById("mic-btn");
  btn.classList.toggle("active", !micOn);
  btn.innerText = micOn ? "🎤 Mic" : "🔇 Muted";
}

/* CAM */
function toggleCam(){
  if(!localTracks[1]) return;

  camOn = !camOn;
  localTracks[1].setEnabled(camOn);

  const btn = document.getElementById("cam-btn");
  btn.classList.toggle("active", !camOn);
  btn.innerText = camOn ? "📷 Cam" : "🚫 Off";
}

</script>

</body>
</html>
