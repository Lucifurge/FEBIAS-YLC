<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC Staff Chat</title>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<style>
:root{
  --bg:#0b0b0f;
  --panel:#15151c;
  --panel2:#1c1c26;
  --accent:#ff4d00;
  --text:#fff;
  --muted:#a1a1aa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR */
#sidebar{
  width:70px;
  background:#0a0a0d;
  display:flex;
  justify-content:center;
  padding:10px;
}

.logo{
  width:45px;height:45px;
  background:var(--accent);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;}

/* HEADER */
#header{
  height:55px;
  background:var(--panel);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  border-bottom:1px solid #222;
}

#callBtn{
  background:var(--accent);
  border:none;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* VIDEO */
#videoBox{
  display:none;
  background:black;
  padding:10px;
  border-bottom:1px solid #222;
}

#videos{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.videoTile{
  width:180px;
  height:140px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:var(--panel2);
  color:white;
  cursor:pointer;
}

.btn.active{
  background:var(--accent);
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px 12px;
  border-radius:12px;
  background:var(--panel2);
  max-width:70%;
}

.me{background:var(--accent);align-self:flex-end;}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:var(--panel);
  border-top:1px solid #222;
}

#text{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0f0f14;
  color:white;
}

#send{
  margin-left:10px;
  background:var(--accent);
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="logo">Y</div>
</div>

<div id="main">

<div id="header">
  <span>Staff Chat</span>
  <button id="callBtn" onclick="toggleVideo()">📞 Call</button>
</div>

<!-- VIDEO -->
<div id="videoBox">
  <div id="videos"></div>

  <div class="controls">
    <button class="btn" id="joinBtn" onclick="joinCall()">Join</button>
    <button class="btn" id="leaveBtn" onclick="leaveCall()">Leave</button>
    <button class="btn" id="micBtn" onclick="toggleMic()">🎤 Mic</button>
    <button class="btn" id="camBtn" onclick="toggleCam()">📷 Cam</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<div id="input">
  <input id="text" placeholder="Message...">
  <button id="send" onclick="sendMsg()">Send</button>
</div>

</div>

<script>

const APP_ID = "81cc7072a40b4f14a790848d6035888a";
const CHANNEL = "ylc-room";
const API = "https://script.google.com/macros/s/AKfycbyTk_7LRdKUpUywWIuWlzgnTanUy2E-Ob-Caa_t5Do87MiKU602Kz_vQ0bZozgJ7rQB/exec";

let name = prompt("Enter name:");
let client = AgoraRTC.createClient({ mode:"rtc", codec:"vp8" });

let localAudio = null;
let localVideo = null;

let micOn = true;
let camOn = true;

let remote = {};

/* CHAT */
async function loadChat(){
  const res = await fetch(API+"?action=get");
  const data = await res.json();

  const box = document.getElementById("chat");
  box.innerHTML="";

  data.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+(m.user===name?"me":"");
    div.textContent = m.user+": "+m.message;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

async function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  await fetch(API+"?action=send&user="+name+"&message="+input.value);
  input.value="";
  loadChat();
}

/* VIDEO */
async function joinCall(){
  await client.join(APP_ID, CHANNEL, null, null);

  const tracks = await AgoraRTC.createMicrophoneAndCameraTracks();

  localAudio = tracks[0];
  localVideo = tracks[1];

  const localBox=document.createElement("div");
  localBox.className="videoTile";
  document.getElementById("videos").appendChild(localBox);

  localVideo.play(localBox);

  await client.publish([localAudio, localVideo]);

  client.on("user-published", async(user, mediaType)=>{
    await client.subscribe(user, mediaType);

    if(!remote[user.uid]){
      const div=document.createElement("div");
      div.className="videoTile";
      div.id="u-"+user.uid;
      document.getElementById("videos").appendChild(div);
      remote[user.uid]=div;
    }

    if(mediaType==="video"){
      user.videoTrack.play(remote[user.uid]);
    }

    if(mediaType==="audio"){
      user.audioTrack.play();
    }
  });
}

/* FIXED MIC TOGGLE (NO BUG) */
async function toggleMic(){
  if(!localAudio) return;

  micOn = !micOn;
  await localAudio.setEnabled(micOn);

  document.getElementById("micBtn").classList.toggle("active", micOn);
}

/* FIXED CAM TOGGLE */
async function toggleCam(){
  if(!localVideo) return;

  camOn = !camOn;
  await localVideo.setEnabled(camOn);

  document.getElementById("camBtn").classList.toggle("active", camOn);
}

/* LEAVE */
async function leaveCall(){
  if(localAudio) localAudio.close();
  if(localVideo) localVideo.close();

  await client.leave();

  document.getElementById("videos").innerHTML="";
  remote={};
  localAudio=null;
  localVideo=null;
}

/* UI */
function toggleVideo(){
  const v=document.getElementById("videoBox");
  v.style.display = v.style.display==="block"?"none":"block";
}

/* AUTO REFRESH CHAT (SMOOTH) */
setInterval(()=>{
  if(name) loadChat();
},3000);

loadChat();

</script>

</body>
</html>
