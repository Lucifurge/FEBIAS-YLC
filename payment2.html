<script>
// Loader element
const loader = document.getElementById('loader');

// Get rowIndex from URL
const urlParams = new URLSearchParams(window.location.search);
const rowIndex = urlParams.get("rowIndex");

if (!rowIndex) {
  alert("Invalid access. Please register first.");
  window.location.href = "ylc2.html";
}

document.getElementById('payment-form').addEventListener('submit', async e => {
  e.preventDefault();

  const submitBtn = e.target.querySelector('button[type="submit"]');
  const paymentBy = document.querySelector('input[name="payment_by"]:checked')?.value;

  if (!paymentBy) {
    alert('Please select payment type');
    return;
  }

  // Show loader & disable submit button to prevent double clicks
  loader.style.display = 'block';
  submitBtn.disabled = true;

  try {
    const postData = new URLSearchParams();
    postData.append('action', 'payment');
    postData.append('rowIndex', rowIndex);
    postData.append('sheet', 'ylc2');
    postData.append('payment_by', paymentBy);

    const res = await fetch("https://script.google.com/macros/s/AKfycbxJBP-r5ADNDEKhnCpmBjDl7_WMDBP8lrBuZ9Y6xbTMve9KScxUXhAOjmHcrdGv-B0s7A/exec", {
      method: 'POST',
      body: postData
    });

    const result = await res.json();

    if (result.result !== 'success') {
      alert('Payment update failed. Please try again.');
      loader.style.display = 'none';
      submitBtn.disabled = false;
      return;
    }

    // Success → redirect to thankyou page with rowIndex
    window.location.href = 'thankyou.html?rowIndex=' + rowIndex;

  } catch (err) {
    console.error(err);
    alert('Payment submission failed. Please try again.');
    loader.style.display = 'none';
    submitBtn.disabled = false;
  }
});
</script>
