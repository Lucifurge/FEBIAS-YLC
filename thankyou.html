<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | YLC 2026</title>
<link rel="icon" href="logo.ico">

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;700&family=Roboto:wght@400;500&display=swap');

/* Body */
body {
  background: linear-gradient(180deg,#FF6A00,#E63900);
  color: #FFFFFF;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  line-height: 1.6;
  font-family:'Montserrat',sans-serif;
}

/* Container */
.container {
  background: rgba(0,0,0,0.85);
  padding: 3rem 2rem;
  border-radius: 18px;
  box-shadow: 0 10px 35px rgba(255,106,0,0.4);
  text-align: center;
  max-width: 500px;
  border-top: 6px solid #FFD700;
}

/* Logo */
.container img {
  width: 120px;
  height: auto;
  margin-bottom: 1.5rem;
  border-radius: 50%;
  box-shadow: 0 4px 15px rgba(255,214,0,0.4);
}

/* Headings & text */
h1 {
  font-family:'Bebas Neue',cursive;
  color: #FF6A00;
  margin-bottom: 1rem;
  font-size: 28px;
  text-transform: uppercase;
}

p {
  margin-bottom: 2rem;
  font-size: 1.1rem;
  color: #FFFFFF;
}

/* Button */
button {
  padding: 1rem 2rem;
  font-size: 1.1rem;
  font-weight: 700;
  color: #000;
  background: #FF6A00;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: #FFD700;
  transform: scale(1.05);
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    padding: 2rem 1.5rem;
  }
  h1 {
    font-size: 24px;
  }
  button {
    font-size: 1rem;
    padding: 0.9rem 1.5rem;
  }
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.jpg" alt="YLC Logo">
  <h1>Thank You!</h1>
  <p>Your payment has been successfully recorded. Please keep a screenshot or receipt for your records.</p>
  <button onclick="goHome()">🏠 Go Back to Home</button>
</div>

<script>
function goHome() {
  window.location.href = "ylc2.html";
}
</script>

</body>
</html>
