<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | YLC 2026</title>
<link rel="icon" href="logo.ico">

<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

/* Body */
body {
  background: #f9f9f9;
  color: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  line-height: 1.6;
}

/* Container */
.container {
  background: #fff;
  padding: 3rem 2rem;
  border-radius: 18px;
  box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
  text-align: center;
  max-width: 500px;
  border-top: 6px solid #c9a227;
}

/* Logo */
.container img {
  width: 120px;
  height: auto;
  margin-bottom: 1.5rem;
  border-radius: 50%;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Headings & text */
h1 {
  color: #1f6b3a;
  margin-bottom: 1rem;
  font-size: 28px;
}
p {
  margin-bottom: 2rem;
  font-size: 1.1rem;
  color: #555;
}

/* Button */
button {
  padding: 1rem 2rem;
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  background: #1f6b3a;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}
button:hover {
  background: #16542d;
  transform: scale(1.05);
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    padding: 2rem 1.5rem;
  }
  h1 {
    font-size: 24px;
  }
  button {
    font-size: 1rem;
    padding: 0.9rem 1.5rem;
  }
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.jpg" alt="YLC Logo">
  <h1>Thank You!</h1>
  <p>Your payment has been successfully recorded. Please keep a screenshot or receipt for your records.</p>
  <button onclick="goHome()">🏠 Go Back to Home</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
