<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Payment | FEBIAS College of Bible</title>
<link rel="icon" href="logo.ico">
<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #111, #1c1c1c);
  color:#fff;
}

.container {
  max-width:600px;
  margin:50px auto;
  background:#1a1a1a;
  padding:30px;
  border-radius:16px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1 {
  text-align:center;
  color:#c9a227;
  margin-bottom:30px;
}

h2 {
  margin-top:25px;
  color:#ddd;
  font-size:18px;
}

input[type=email],
input[type=text],
input[type=file] {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #c9a227;
  background:#111;
  color:#fff;
}

input[type=email]:focus,
input[type=text]:focus {
  outline:none;
  box-shadow:0 0 10px #c9a227;
}

label {
  display:block;
  margin-top:10px;
}

.payment-methods {
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  gap:10px;
}

.payment-box {
  flex:1;
  background:#111;
  border:2px solid #333;
  border-radius:12px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:all 0.3s ease;
}

.payment-box:hover {
  transform:scale(1.05);
  border-color:#c9a227;
}

.payment-box.selected {
  border:2px solid #c9a227;
  background:#2a2100;
}

.payment-box img {
  width:60px;
  margin-bottom:8px;
}

.notice {
  margin:15px 0;
  padding:10px;
  background:#2a2100;
  border-left:4px solid #c9a227;
  font-size:14px;
  border-radius:8px;
}

button {
  width:100%;
  padding:14px;
  margin-top:25px;
  border:none;
  border-radius:12px;
  background:#c9a227;
  color:#111;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover {
  background:#e5c14c;
  transform:scale(1.03);
}

footer {
  text-align:center;
  margin-top:40px;
  font-size:13px;
  color:#888;
}
</style>
</head>
<body>
<div class="container">
<h1>YLC 2026 Payment Confirmation</h1>

<form id="payment-form">
<h2>Enter your registration email</h2>
<input type="email" id="regEmail" placeholder="Your email" required>

<h2>Select Payment Type</h2>
<label><input type="radio" name="payment_by" value="Onsite" required> Onsite Payment</label>
<label><input type="radio" name="payment_by" value="Online"> Online Payment</label>

<div class="notice">⚠️ Please Upload your receipt if online payment.</div>

<h2>Payment Methods</h2>
<div class="payment-methods">
  <div class="payment-box" data-method="Bank Numbers">
    <img src="bank.png" alt="Bank Numbers"><span>Bank Numbers</span>
  </div>
  <div class="payment-box" data-method="GCash QR">
    <img src="gcash.png" alt="GCash QR"><span>GCash QR</span>
  </div>
</div>

<div id="online-upload" style="display:none;">
  <label for="fileName">Enter your receipt name:</label>
  <input type="text" id="fileName">
  <label for="receipt">Upload receipt photo:</label>
  <input type="file" id="receipt" accept="image/*">
  <div class="notice">⚠️ Make sure the filename matches your registration name.</div>
</div>

<button type="submit">✅ Confirm Payment</button>
</form>
</div>

<footer>© 2026 FEBIAS College of Bible — Youth Leaders Camp</footer>

<script>
const sheetUrl = "https://script.google.com/macros/s/AKfycbxJBP-r5ADNDEKhnCpmBjDl7_WMDBP8lrBuZ9Y6xbTMve9KScxUXhAOjmHcrdGv-B0s7A/exec";
const driveUrl = "https://script.google.com/macros/s/AKfycbzUuUYbHJdFAPtKc--MWy9B93cl4X--TtMc3IsaA3IR3Q0JBaEominP9t9nFxRVIYcR/exec";

const onlineUpload = document.getElementById('online-upload');
const paymentBoxes = document.querySelectorAll('.payment-box');
const paymentRadios = document.querySelectorAll('input[name="payment_by"]');
const paymentMethodsDiv = document.querySelector('.payment-methods');

// 🔥 GET rowIndex FROM URL
const urlParams = new URLSearchParams(window.location.search);
const rowIndex = urlParams.get("rowIndex");

if (!rowIndex) {
  alert("Invalid access. Please register first.");
  window.location.href = "ylc.html";
}

// Show/hide payment methods
paymentRadios.forEach(radio => {
  radio.addEventListener('change', () => {
    if (radio.value === 'Online') {
      onlineUpload.style.display = 'block';
      paymentMethodsDiv.style.display = 'flex';
    } else {
      onlineUpload.style.display = 'none';
      paymentMethodsDiv.style.display = 'none';
      paymentBoxes.forEach(b => b.classList.remove('selected'));
    }
  });
});

// Highlight payment box
paymentBoxes.forEach(box => {
  box.addEventListener('click', () => {
    paymentBoxes.forEach(b => b.classList.remove('selected'));
    box.classList.add('selected');
  });
});

// Submit
document.getElementById('payment-form').addEventListener('submit', async e => {
  e.preventDefault();

  const paymentBy = document.querySelector('input[name="payment_by"]:checked')?.value;
  const selectedBox = document.querySelector('.payment-box.selected');
  const method = selectedBox?.dataset.method;

  if (!paymentBy) {
    alert('Please select payment type');
    return;
  }

  if (paymentBy === 'Online' && !method) {
    alert('Please select a payment method');
    return;
  }

  // 1️⃣ Update Sheet
  try {
    const postData = new URLSearchParams();
    postData.append('action', 'payment');
    postData.append('rowIndex', rowIndex);
    postData.append('sheet', 'ylc');

    if (paymentBy === 'Online') {
      postData.append('payment_by', 'Online (' + method + ')');
    } else {
      postData.append('payment_by', 'Onsite');
    }

    const res = await fetch(sheetUrl, { method: 'POST', body: postData });
    const result = await res.json();

    if (result.result !== 'success') {
      alert('Sheet update failed: ' + result.error);
      return;
    }

  } catch (err) {
    alert('Payment update failed: ' + err);
    return;
  }

  // 2️⃣ Upload Receipt if Online
  if (paymentBy === 'Online') {
    const file = document.getElementById('receipt').files[0];
    const fileName = document.getElementById('fileName').value.trim();

    if (!file || !fileName) {
      alert('Please enter receipt name and upload file');
      return;
    }

    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];

      const uploadData = new URLSearchParams();
      uploadData.append('fileName', fileName);
      uploadData.append('file', base64);
      uploadData.append('fileType', file.type);

      try {
        const res = await fetch(driveUrl, { method: 'POST', body: uploadData });
        const result = await res.json();

        if (result.result !== 'success') {
          alert('Receipt upload failed: ' + result.error);
          return;
        }

        alert('Payment confirmed and receipt uploaded!');
        window.location.href = 'thankyou.html';

      } catch (err) {
        alert('Drive upload failed: ' + err);
      }
    };

    reader.readAsDataURL(file);

  } else {
    alert('Onsite payment recorded successfully!');
    window.location.href = 'thankyou.html';
  }
});
</script>
</body>
</html>
