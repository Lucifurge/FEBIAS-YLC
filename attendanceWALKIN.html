<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="refine.ico">
<title>YLC 2026 WALK-IN Admin Attendance System</title>

<style>
body{
  font-family:Segoe UI,sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
  color:white;
  margin:0;
  padding:15px;
}

/* TITLE */
h1{
  text-align:center;
  color:#ff6a00;
  margin-bottom:5px;
  letter-spacing:2px;
  font-size:28px;
  text-transform:uppercase;
}

.sub{
  text-align:center;
  color:#999;
  margin-bottom:10px;
  font-size:13px;
}

/* INSTRUCTIONS */
.instructions{
  max-width:1100px;
  margin:12px auto;
  background:linear-gradient(145deg,#151515,#101010);
  border:1px solid #2a2a2a;
  padding:14px;
  border-radius:12px;
  color:#ccc;
  font-size:13px;
  line-height:1.6;
}

/* SEARCH */
.search-bar{
  display:flex;
  justify-content:center;
  margin:15px 0 8px 0;
}

.search-bar input{
  width:100%;
  max-width:500px;
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
  outline:none;
}

/* DROPDOWN STYLE */
.room-dropdown-wrap{
  display:flex;
  justify-content:center;
  margin:8px 0 15px 0;
}

.room-dropdown-wrap select{
  width:100%;
  max-width:500px;
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
  outline:none;
}

/* STATS */
.stats{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:15px 0;
}

.box{
  background:linear-gradient(145deg,#1a1a1a,#141414);
  padding:12px;
  border-radius:12px;
  min-width:140px;
  text-align:center;
  border:1px solid #2a2a2a;
}

.box span{
  color:#ff6a00;
  font-weight:bold;
  font-size:20px;
}

/* ROOM BOX */
.room-box{
  max-width:1100px;
  margin:12px auto;
  background:linear-gradient(145deg,#151515,#101010);
  border:1px solid #2a2a2a;
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:#ccc;
}

/* TABLE */
.table-wrap{
  overflow-x:auto;
  margin-top:15px;
}

table{
  width:100%;
  min-width:1600px;
  border-collapse:collapse;
}

th{
  background:linear-gradient(145deg,#1a1a1a,#111);
  color:#ff6a00;
  padding:12px;
  position:sticky;
  top:0;
}

td{
  padding:10px;
  border:1px solid #1f1f1f;
  background:#121212;
  text-align:center;
  font-size:13px;
}

/* SELECT */
select{
  background:#111;
  color:white;
  border:1px solid #333;
  padding:6px;
  border-radius:8px;
}

</head>

const BASE_URL = "https://script.google.com/macros/s/AKfycbwLaZlaSDJKLwuSGQejc2Mi3R34VLAhvPzRtI_uDsUY_6RaAKlsLBnOBRYHcuu42xqA/exec";
const SHEET = "WALK-IN";

const ROOM_LIMIT = 9;

const AC_ROOMS = [
  "Berean Area",
  "Berean – Abraham 2",
  "Berean – Joshua 3",
  "Berean – Elijah 3",
  "Berean – Elisha 3",
  "Sharon – Deborah 2",
  "Sharon – Martha 3",
  "Sharon – Abigail 2",
  "Sharon – Eve 2"
];

let tbody = document.querySelector("tbody");
let allData = [];
let roomCount = {};
let updatingRows = new Set();

/* 🔥 ADDED: selected row for top dropdown */
let selectedRowId = null;

const clean = v => (v || "").toString().trim();

/* =========================
   ICONS
========================= */
function payIcon(v){
  if(!v) return "❌ NOT PAID";
  if(v.includes("NOT")) return "❌ NOT PAID";
  if(v.includes("ONSITE")) return "🟠 ONSITE";
  if(v.includes("ONLINE")) return "💳 ONLINE";
  if(v.includes("PAID")) return "✔ PAID";
  return v;
}

function attIcon(v){
  if(v === "Attended") return "✔ ATTENDED";
  if(v === "Cancelled") return "❌ CANCELLED";
  return "🟠 WAITING";
}

/* =========================
   STATS
========================= */
function updateStats(){
  let paid = 0, waiting = 0;

  allData.forEach(p=>{
    if((p.payment_indicator||"").includes("PAID")) paid++;
    if(p.attendance_status === "ON-waiting") waiting++;
  });

  document.getElementById("total").textContent = allData.length;
  document.getElementById("paid").textContent = paid;
  document.getElementById("waiting").textContent = waiting;
}

/* =========================
   ROOM COUNTS
========================= */
function computeRoomCounts(){
  roomCount = {};
  AC_ROOMS.forEach(r => roomCount[r] = 0);

  allData.forEach(p=>{
    let r = clean(p.room_ac);
    if(roomCount[r] !== undefined) roomCount[r]++;
  });
}

function updateRoomStats(){
  computeRoomCounts();

  let html = "<b>ROOM AC STATUS</b><br>";

  AC_ROOMS.forEach(r=>{
    let c = roomCount[r];
    let full = c >= ROOM_LIMIT;

    html += `${r} <span class="badge ${full?"full":"available"}">${c}/${ROOM_LIMIT}</span><br>`;
  });

  document.getElementById("roomStats").innerHTML = html;
}

/* =========================
   SEND
========================= */
function send(action,data){
  let fd = new FormData();
  fd.append("action",action);

  for(let k in data){
    fd.append(k,data[k]);
  }

  let id = String(data.rowIndex);

  updatingRows.add(id);

  fetch(BASE_URL,{method:"POST",body:fd})
    .then(r=>r.json())
    .then(()=>{
      setTimeout(()=>{
        updatingRows.delete(id);
      },3000);
    })
    .catch(()=>{
      updatingRows.delete(id);
    });
}

   CREATE ROW
========================= */
function createRow(p){

  let tr = document.createElement("tr");
  tr.dataset.id = p.rowIndex;

  tr.innerHTML = `
    <td>${p.rowIndex}</td>
    <td>${p.firstName || ""} ${p.lastName || ""}</td>
    <td>${p.gender || ""}</td>
    <td>${p.room_ac || ""}</td>

    <td class="payment">${payIcon(p.payment_indicator)}</td>
    <td class="amount">${p.amount || ""}</td>

    <td>
      <select class="mode">
        <option ${p.mode_of_payment==="ONSITE"?"selected":""}>ONSITE</option>
        <option ${p.mode_of_payment==="ONLINE"?"selected":""}>ONLINE</option>
      </select>
    </td>

    <td class="pay">${payIcon(p.payment_indicator)}</td>
    <td class="att">${attIcon(p.attendance_status)}</td>

    <td>
      <select class="shirt">
        <option ${p.shirt_size==="S"?"selected":""}>S</option>
        <option ${p.shirt_size==="M"?"selected":""}>M</option>
        <option ${p.shirt_size==="L"?"selected":""}>L</option>
        <option ${p.shirt_size==="XL"?"selected":""}>XL</option>
        <option ${p.shirt_size==="XXL"?"selected":""}>XXL</option>
        <option ${p.shirt_size==="3XL"?"selected":""}>3XL</option>
      </select>
    </td>

    <td class="kit">${p.kit_distribution || "❌"}</td>
    <td class="aircon">${p.aircon_pref || "❌"}</td>

    <td>
      <select class="roomac"></select>
    </td>
  `;

  tbody.appendChild(tr);

  const roomSelect = tr.querySelector(".roomac");

  function refreshRooms(){
    roomSelect.innerHTML =
      `<option value="">ROOM AC</option>` +
      AC_ROOMS.map(r=>{
        let count = roomCount[r] || 0;
        let full = count >= ROOM_LIMIT;

        return `
          <option value="${r}"
            ${p.room_ac===r?"selected":""}
            ${full && p.room_ac!==r?"disabled":""}>
            ${r} ${full?"(FULL)":""}
          </option>
        `;
      }).join("");
  }

  refreshRooms();

  /* 🔥 ROW SELECT FOR TOP DROPDOWN */
  tr.onclick = () => {
    selectedRowId = p.rowIndex;

    document.querySelectorAll("tr").forEach(r=>{
      r.style.outline = "";
    });
    tr.style.outline = "2px solid #ff6a00";
  };

  /* MODE */
  tr.querySelector(".mode").onchange = (e)=>{
    send("mode",{rowIndex:p.rowIndex,value:e.target.value});
  };

  /* PAYMENT */
  tr.querySelector(".pay").onclick = ()=>{

    let state = p.payment_indicator;

    let next;
    if(state === "NOT PAID ❌") next = "ONSITE 🟠";
    else if(state === "ONSITE 🟠") next = "PAID ✔";
    else next = "NOT PAID ❌";

    p.payment_indicator = next;

    tr.querySelector(".pay").textContent = payIcon(next);
    tr.querySelector(".payment").textContent = payIcon(next);

    send("payment",{rowIndex:p.rowIndex,value:next});
    updateStats();
  };

  /* ATTENDANCE */
  tr.querySelector(".att").onclick = ()=>{

    let next;
    if(p.attendance_status === "Cancelled") next = "ON-waiting";
    else if(p.attendance_status === "ON-waiting") next = "Attended";
    else next = "Cancelled";

    p.attendance_status = next;
    tr.querySelector(".att").textContent = attIcon(next);

    send("attendance",{rowIndex:p.rowIndex,status:next});
  };

  /* KIT */
  tr.querySelector(".kit").onclick = ()=>{
    let next = p.kit_distribution==="❌"?"🟠":p.kit_distribution==="🟠"?"✔":"❌";
    p.kit_distribution = next;

    tr.querySelector(".kit").textContent = next;
    send("kit",{rowIndex:p.rowIndex,state:next});
  };

  /* AIRCON */
  tr.querySelector(".aircon").onclick = ()=>{
    let next = p.aircon_pref==="❌"?"🟠":p.aircon_pref==="🟠"?"✔":"❌";
    p.aircon_pref = next;

    tr.querySelector(".aircon").textContent = next;
    send("aircon",{rowIndex:p.rowIndex,state:next});
  };

  /* ROOM AC */
  roomSelect.onchange = (e)=>{
    let val = clean(e.target.value);

    let tempCount = {...roomCount};
    tempCount[val] = (tempCount[val] || 0) + 1;

    if(val && tempCount[val] > ROOM_LIMIT && val !== p.room_ac){
      alert("ROOM FULL (9 MAX)");
      e.target.value = p.room_ac;
      return;
    }

    p.room_ac = val;

    send("room_ac",{rowIndex:p.rowIndex,value:val});

    updateRoomStats();
    refreshRooms();
  };

  /* SHIRT */
  tr.querySelector(".shirt").onchange = (e)=>{
    send("shirt",{rowIndex:p.rowIndex,value:e.target.value});
  };
}

/* =========================
   TOP DROPDOWN FUNCTION (ADDED)
========================= */
document.getElementById("roomDropdown").onchange = (e)=>{

  let val = clean(e.target.value);

  if(!selectedRowId){
    alert("Please select a camper row first.");
    e.target.value = "";
    return;
  }

  send("room_ac",{rowIndex:selectedRowId,value:val});

  let row = document.querySelector(`tr[data-id="${selectedRowId}"]`);
  if(row){
    let cell = row.querySelector("td:nth-child(4)");
    if(cell) cell.textContent = val;
  }

  updateRoomStats();
  e.target.value = "";
};

      let roomSel = existing.querySelector(".roomAssign");

      }
    } else {
      createRow(newRow);
    }

}
