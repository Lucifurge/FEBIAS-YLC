<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance | FEBIAS College of Bible</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #f8f8f8;
  color: #1f2937;
  padding: 2rem;
}

h1 { text-align: center; color: #0b3d2e; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1.5rem;
}

th, td {
  border: 1px solid #ccc;
  padding: 0.8rem;
}

th {
  background: #0b3d2e;
  color: white;
}

.status-paid { color: green; font-weight: bold; }
.status-onsite { color: orange; font-weight: bold; }
.status-not { color: red; font-weight: bold; }

.attendance-check {
  cursor: pointer;
  text-align: center;
  font-size: 1.4rem;
}
</style>
</head>
<body>

<h1>YLC 2026 Attendance</h1>
<p>Click the emoji to update attendance (✅ = Attended, 🟠 = Waiting, ❌ = Cancelled).</p>

<button onclick="loadAttendance()">🔄 Refresh Now</button>

<table id="attendance-table">
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment Status</th>
<th>Attendance</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbw43IxCOZWnOUQrew5tjQEKsvHIKIRmzT4KgrBAJbC8oKgt08ICBtfJmZcfo8-1NDTAIA/exec";
const tbody = document.querySelector("#attendance-table tbody");

let peopleMap = new Map();
let localOverrides = new Map();
const statusCycle = ["ON-waiting", "Attended", "Cancelled"];
let lastManualUpdate = 0;

// Render or update a row
function renderRow(person) {
  let tr = peopleMap.get(person.rowIndex);

  if (!tr) {
    tr = document.createElement("tr");
    tr.dataset.row = person.rowIndex;
    tr.dataset.locked = "false";
    tr.innerHTML = `
      <td class="first"></td>
      <td class="last"></td>
      <td class="payment"></td>
      <td class="attendance-check"></td>
    `;
    tbody.appendChild(tr);
    peopleMap.set(person.rowIndex, tr);
  }

  // Use local override if exists
  if (localOverrides.has(person.rowIndex)) {
    person.attendanceStatus = localOverrides.get(person.rowIndex);
  }

  tr.querySelector(".first").textContent = person.firstName || "";
  tr.querySelector(".last").textContent = person.lastName || "";

  const paymentCell = tr.querySelector(".payment");
  const attendanceCell = tr.querySelector(".attendance-check");

  // Payment UI helper
  function updatePaymentUI(status) {
    const lower = (status || "").toLowerCase();
    if (lower.includes("online")) {
      paymentCell.textContent = "✅ Paid";
      paymentCell.className = "payment status-paid";
    } else if (lower.includes("onsite")) {
      paymentCell.textContent = "⚠️ On-Waiting";
      paymentCell.className = "payment status-onsite";
    } else {
      paymentCell.textContent = "❌ Not Paid";
      paymentCell.className = "payment status-not";
    }
  }

  // Attendance emoji helper
  function setEmoji(status) {
    attendanceCell.textContent =
      status === "Attended" ? "✅" :
      status === "Cancelled" ? "❌" : "🟠";
  }

  updatePaymentUI(person.paymentStatus);
  setEmoji(person.attendanceStatus);

  attendanceCell.onclick = async () => {
    if (tr.dataset.locked === "true") return; // prevent double click
    tr.dataset.locked = "true";

    let current = localOverrides.get(person.rowIndex) || person.attendanceStatus;
    let idx = statusCycle.indexOf(current);
    if (idx === -1) idx = 0;
    let newStatus = statusCycle[(idx + 1) % statusCycle.length];

    // Save locally first
    localOverrides.set(person.rowIndex, newStatus);
    setEmoji(newStatus);

    if (newStatus === "Attended") updatePaymentUI("Online Payment");
    else if (newStatus === "ON-waiting") updatePaymentUI("Onsite Payment");
    else updatePaymentUI("Not Paid");

    // Send update to backend
    const formData = new FormData();
    formData.append("action", "attendance");
    formData.append("rowIndex", person.rowIndex);
    formData.append("attendance_status", newStatus);
    formData.append("sheet", "Walk-in");

    try {
      const res = await fetch(BASE_URL, { method: "POST", body: formData });
      const json = await res.json();
      if (json.success) {
        // update local map
        localOverrides.set(person.rowIndex, newStatus);
        lastManualUpdate = Date.now();
        // clear override after 5s to allow auto-refresh
        setTimeout(() => localOverrides.delete(person.rowIndex), 5000);
      }
    } catch (err) {
      console.error("Sync error:", err);
    } finally {
      tr.dataset.locked = "false";
    }
  };
}

// Load data
async function loadAttendance() {
  try {
    const res = await fetch(BASE_URL + "?sheet=ylc2");
    const data = await res.json();
    if (!Array.isArray(data)) return;
    data.forEach(person => renderRow(person));
  } catch (err) {
    console.error("Load error:", err);
  }
}

// Manual refresh button
document.querySelector("button").onclick = () => {
  lastManualUpdate = Date.now();
  loadAttendance();
};

// Auto-refresh every 15s, but skip if a manual update just occurred
setInterval(() => {
  if (Date.now() - lastManualUpdate > 5000) loadAttendance();
}, 15000);

loadAttendance();
</script>

</body>
</html>
