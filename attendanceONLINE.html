<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance Online</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f0f0f;
  color: #ffffff;
  padding: 2rem;
}

h1 {
  text-align: center;
  color: #ff6a00;
  letter-spacing: 2px;
}

.sub {
  text-align: center;
  color: #bbb;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 15px 0;
  flex-wrap: wrap;
}

.box {
  background: #1a1a1a;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid #333;
  text-align: center;
}

.box span {
  color: #ff6a00;
  font-weight: bold;
  font-size: 18px;
}

button {
  display: block;
  margin: 0 auto 1rem auto;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(45deg, #ff6a00, #ff2e00);
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1rem;
}

th {
  background: #1a1a1a;
  color: #ff6a00;
  padding: 12px;
}

td {
  border: 1px solid #222;
  padding: 10px;
  background: #121212;
}

.payment, .attendance {
  cursor: pointer;
  text-align: center;
  font-size: 1.3rem;
}

.status-paid { color: #00ff88; font-weight: bold; }
.status-onsite { color: #ffb000; font-weight: bold; }
.status-not { color: #ff3b3b; font-weight: bold; }
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE ONLINE</h1>
<div class="sub">FEBIAS College of Bible System</div>

<div class="stats">
  <div class="box">Total Members<br><span id="totalCount">0</span></div>
  <div class="box">YLC Eligible (16–18)<br><span id="ylcCount">0</span></div>
  <div class="box">Countdown to YLC<br><span id="countdown">Loading...</span></div>
</div>

<button onclick="loadAttendance()">🔥 REFRESH DATA</button>

<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment</th>
<th>Attendance</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbyCbc7zJ-nkcIcTWanli5zj1q8PV5dfz1owsK2s7vNHEcfcgWHrkwY-uEZ2J9lfetatdQ/exec";
const SHEET_NAME = "Pre-Registration";

const tbody = document.querySelector("tbody");

let peopleMap = new Map();
let localOverrides = new Map();

const attendanceCycle = ["ON-waiting", "Attended", "Cancelled"];
const paymentCycle = ["NOT PAID", "ON-WAITING PAYMENT", "PAID"];

// ===============================
// STATS
// ===============================
function updateStats(data) {
  const total = data.length;

  const ylc = data.filter(p => {
    const age = parseInt(p.age || 0);
    return age >= 16 && age <= 18;
  }).length;

  document.getElementById("totalCount").textContent = total;
  document.getElementById("ylcCount").textContent = ylc;
}

// ===============================
// COUNTDOWN (YLC 2026 - SET DATE HERE)
// ===============================
function startCountdown() {
  const eventDate = new Date("2026-06-15T00:00:00"); // change if needed

  setInterval(() => {
    const now = new Date();
    const diff = eventDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").textContent = "EVENT STARTED";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

    document.getElementById("countdown").textContent =
      `${days}d ${hours}h`;
  }, 1000);
}

// ===============================
// RENDER ROW
// ===============================
function renderRow(person) {

  let tr = peopleMap.get(person.rowIndex);

  if (!tr) {
    tr = document.createElement("tr");
    tr.dataset.row = person.rowIndex;
    tr.dataset.locked = "false";

    tr.innerHTML = `
      <td class="first"></td>
      <td class="last"></td>
      <td class="payment"></td>
      <td class="attendance"></td>
    `;

    tbody.appendChild(tr);
    peopleMap.set(person.rowIndex, tr);
  }

  tr.querySelector(".first").textContent = person.firstName || "";
  tr.querySelector(".last").textContent = person.lastName || "";

  const paymentCell = tr.querySelector(".payment");
  const attendanceCell = tr.querySelector(".attendance");

  // PAYMENT
  let paymentState = (person.paymentIndicator || "NOT PAID").toUpperCase();

  function setPaymentUI(state) {
    paymentCell.textContent =
      state === "PAID" ? "✅ PAID" :
      state === "ON-WAITING PAYMENT" ? "🟠 ON-WAITING PAYMENT" :
      "❌ NOT PAID";

    paymentCell.className =
      state === "PAID" ? "payment status-paid" :
      state === "ON-WAITING PAYMENT" ? "payment status-onsite" :
      "payment status-not";
  }

  setPaymentUI(paymentState);

  // ATTENDANCE
  function setAttendanceUI(state) {
    attendanceCell.textContent =
      state === "Attended" ? "✅" :
      state === "Cancelled" ? "❌" :
      "🟠";
  }

  let attendanceState =
    localOverrides.get(person.rowIndex) ||
    person.attendanceStatus ||
    "ON-waiting";

  setAttendanceUI(attendanceState);
}

// ===============================
// LOAD DATA
// ===============================
async function loadAttendance() {
  try {
    const res = await fetch(BASE_URL + "?sheet=" + SHEET_NAME);
    const data = await res.json();

    if (!Array.isArray(data)) return;

    tbody.innerHTML = "";
    peopleMap.clear();

    // SORT (LAST NAME + FIRST NAME)
    data.sort((a, b) => {
      const A = ((a.lastName || "") + " " + (a.firstName || "")).toLowerCase();
      const B = ((b.lastName || "") + " " + (b.firstName || "")).toLowerCase();
      return A.localeCompare(B);
    });

    updateStats(data);
    data.forEach(renderRow);

  } catch (err) {
    console.error(err);
  }
}

document.querySelector("button").onclick = loadAttendance;
setInterval(loadAttendance, 15000);

loadAttendance();
startCountdown();

</script>

</body>
</html>
