<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance Online</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f0f0f;
  color: #ffffff;
  padding: 1rem;
  margin: 0;
}

h1 {
  text-align: center;
  color: #ff6a00;
  letter-spacing: 1px;
  font-size: 1.4rem;
}

.sub {
  text-align: center;
  color: #bbb;
  font-size: 0.9rem;
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 15px 0;
  flex-wrap: wrap;
}

.box {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  text-align: center;
  flex: 1 1 120px;
  font-size: 0.9rem;
}

.box span {
  color: #ff6a00;
  font-weight: bold;
  font-size: 16px;
}

/* BUTTON */
button {
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 10px auto;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(45deg, #ff6a00, #ff2e00);
  color: white;
}

/* TABLE WRAPPER (FIX MOBILE OVERFLOW) */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* TABLE */
table {
  width: 100%;
  min-width: 520px;
  border-collapse: collapse;
  margin-top: 1rem;
}

th {
  background: #1a1a1a;
  color: #ff6a00;
  padding: 10px;
  font-size: 0.85rem;
  position: sticky;
  top: 0;
  z-index: 2;
}

td {
  border: 1px solid #222;
  padding: 8px;
  background: #121212;
  font-size: 0.85rem;
}

.payment, .attendance, .kit {
  text-align: center;
  font-size: 1.2rem;
  cursor: pointer;
  transition: transform 0.1s ease;
}

.payment:active,
.attendance:active,
.kit:active {
  transform: scale(0.9);
}

/* COLORS (optional future use) */
.status-paid { color: #00ff88; font-weight: bold; }
.status-onsite { color: #ffb000; font-weight: bold; }
.status-not { color: #ff3b3b; font-weight: bold; }

/* MOBILE TWEAKS */
@media (max-width: 600px) {
  h1 {
    font-size: 1.1rem;
  }

  th, td {
    padding: 6px;
    font-size: 0.75rem;
  }

  .payment, .attendance, .kit {
    font-size: 1.1rem;
  }

  .box {
    font-size: 0.8rem;
  }
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE ONLINE</h1>
<div class="sub">FEBIAS College of Bible System</div>

<div class="stats">
  <div class="box">Total Members<br><span id="totalCount">0</span></div>
  <div class="box">Countdown (Apr 16–18)<br><span id="countdown">Loading...</span></div>
</div>

<button onclick="loadAttendance()">🔥 REFRESH DATA</button>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment</th>
<th>Attendance</th>
<th>Kit</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbx8sCjfu06-BduZmmYE-E6W6FFzrNmWmaeJ54UVHuZPL7XsTZb6ko6NG6K6YBeH3wa1sA/exec";
const SHEET_NAME = "Pre-Registration";

const tbody = document.querySelector("tbody");

let peopleMap = new Map();
let localOverrides = new Map();

const kitCycle = ["❌","🟠","✅"];

// ===============================
// STATS
// ===============================
function updateStats(data) {
  document.getElementById("totalCount").textContent = data.length;
}

// ===============================
// COUNTDOWN
// ===============================
function startCountdown() {

  const start = new Date("2026-04-16T00:00:00").getTime();
  const end = new Date("2026-04-18T23:59:59").getTime();

  setInterval(() => {

    const now = new Date().getTime();

    let target;
    let label;

    if (now < start) {
      target = start;
      label = "STARTS IN";
    } 
    else if (now <= end) {
      target = end;
      label = "ENDS IN";
    } 
    else {
      document.getElementById("countdown").textContent = "YLC COMPLETED";
      return;
    }

    const diff = target - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").textContent =
      `${label}: ${d}d ${h}h ${m}m ${s}s`;

  }, 1000);
}

// ===============================
// RENDER ROW
// ===============================
function renderRow(person) {

  let tr = peopleMap.get(person.rowIndex);

  if (!tr) {
    tr = document.createElement("tr");
    tr.dataset.row = person.rowIndex;

    tr.innerHTML = `
      <td></td>
      <td></td>
      <td class="payment"></td>
      <td class="attendance"></td>
      <td class="kit"></td>
    `;

    tbody.appendChild(tr);
    peopleMap.set(person.rowIndex, tr);
  }

  tr.children[0].textContent = person.firstName || "";
  tr.children[1].textContent = person.lastName || "";

  // PAYMENT
  let paymentState = (person.paymentIndicator || "NOT PAID").toUpperCase();

  tr.children[2].textContent =
    paymentState === "PAID" ? "✅" :
    paymentState === "ON-WAITING PAYMENT" ? "🟠" :
    "❌";

  // ATTENDANCE
  let attendanceState =
    localOverrides.get(person.rowIndex) ||
    person.attendanceStatus ||
    "ON-waiting";

  tr.children[3].textContent =
    attendanceState === "Attended" ? "✅" :
    attendanceState === "Cancelled" ? "❌" :
    "🟠";

  // KIT
  let kitState = person.kitDistribution || "❌";
  const kitCell = tr.children[4];

  kitCell.textContent = kitState;

  kitCell.onclick = async () => {

    let idx = kitCycle.indexOf(kitState);
    if (idx === -1) idx = 0;

    kitState = kitCycle[(idx + 1) % kitCycle.length];
    kitCell.textContent = kitState;

    const formData = new FormData();
    formData.append("action", "kit");
    formData.append("rowIndex", person.rowIndex);
    formData.append("kit_state", kitState);
    formData.append("sheet", SHEET_NAME);

    try {
      await fetch(BASE_URL, { method: "POST", body: formData });
    } catch (err) {
      console.error(err);
    }
  };
}

// ===============================
// LOAD DATA
// ===============================
async function loadAttendance() {
  try {
    const res = await fetch(BASE_URL + "?sheet=" + SHEET_NAME);
    const data = await res.json();

    if (!Array.isArray(data)) return;

    tbody.innerHTML = "";
    peopleMap.clear();

    data.sort((a, b) => {
      const A = ((a.lastName || "") + " " + (a.firstName || "")).toLowerCase();
      const B = ((b.lastName || "") + " " + (b.firstName || "")).toLowerCase();
      return A.localeCompare(B);
    });

    updateStats(data);
    data.forEach(renderRow);

  } catch (err) {
    console.error(err);
  }
}

document.querySelector("button").onclick = loadAttendance;
setInterval(loadAttendance, 15000);

loadAttendance();
startCountdown();

</script>

</body>
</html>
