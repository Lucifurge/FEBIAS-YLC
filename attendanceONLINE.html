<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance System</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 10px;
}

h1 { text-align: center; color: #ff6a00; }
.sub { text-align: center; color: #aaa; }

.stats{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.box{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  min-width:140px;
  text-align:center;
}

.table-wrap{ overflow-x:auto; }

table{
  width:100%;
  min-width:2000px;
  border-collapse:collapse;
}

th, td{
  padding:8px;
  border:1px solid #222;
  text-align:center;
}

.clickable{ cursor:pointer; }
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE SYSTEM</h1>
<div class="sub">FEBIAS College of Bible</div>

<div class="stats">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Paid<br><span id="paid">0</span></div>
  <div class="box">Waiting<br><span id="waiting">0</span></div>
</div>

<!-- ROOM STATS -->
<div id="roomStats" style="margin:10px; background:#1a1a1a; padding:10px;"></div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th>#</th><th>Last</th><th>First</th><th>Gender</th><th>Age</th>
  <th>Contact</th><th>Church</th><th>Class</th><th>Room</th>

  <th>Payment Cat</th><th>Amount</th><th>Mode</th>

  <th>PAY</th><th>ATT</th>
  <th>✔</th><th>🟠</th><th>❌</th>

  <th>Shirt</th><th>Kit</th><th>Aircon</th><th>Room A/C</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbxNQDvbtcnYF0Bhw0xwEp_2diIT6my0Z-YdUjD45G1mhdtkTc1eYFfH6kgMm_sPISt76g/exec";
const SHEET = "Pre-Registration";

/* ✅ AC ROOMS */
const AC_ROOMS = [
  "Berean – Abraham 2",
  "Berean – Joshua 3",
  "Berean – Elijah 3",
  "Berean – Elisha 3",
  "Sharon – Deborah 2",
  "Sharon – Martha 3",
  "Sharon – Abigail 2",
  "Sharon – Eve 2"
];

let roomMap = {};

const tbody = document.querySelector("tbody");

let allData = [];

/* ===================== */
/* ICONS */
/* ===================== */
function payIcon(v){
  if(v==="PAID") return "✅";
  if(v==="ON-WAITING PAYMENT") return "🟠";
  return "❌";
}

function attIcon(v){
  if(v==="Attended") return "✅";
  if(v==="ON-waiting") return "🟠";
  return "❌";
}

/* ===================== */
/* STATS */
/* ===================== */
function updateStats(data){
  let paid = 0, waiting = 0;

  data.forEach(p=>{
    if(p.paymentIndicator==="PAID") paid++;
    if(p.paymentIndicator==="ON-WAITING PAYMENT") waiting++;
  });

  total.textContent = data.length;
  paid.textContent = paid;
  waiting.textContent = waiting;
}

/* ===================== */
/* ROOM COUNTS */
/* ===================== */
function updateRoomStats(data){

  roomMap = {};
  AC_ROOMS.forEach(r => roomMap[r] = 0);

  data.forEach(p=>{
    if(roomMap[p.room_ac] !== undefined){
      roomMap[p.room_ac]++;
    }
  });

  let html = "<b>A/C ROOM CAPACITY</b><br>";

  AC_ROOMS.forEach(r=>{
    let c = roomMap[r];
    html += `${r}: ${c}/18 ${c>=18?"❌ FULL":""}<br>`;
  });

  roomStats.innerHTML = html;
}

/* ===================== */
/* RENDER */
/* ===================== */
function render(p){

  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${p.rowIndex}</td>
    <td>${p.lastName}</td>
    <td>${p.firstName}</td>
    <td>${p.gender}</td>
    <td>${p.age}</td>
    <td>${p.contact}</td>
    <td>${p.church}</td>
    <td>${p.classification}</td>

    <td>${p.room}</td>

    <td>${p.paymentCategory}</td>
    <td>${p.amount}</td>
    <td>${p.modeOfPayment}</td>

    <td class="clickable"></td>
    <td class="clickable"></td>

    <td>${p.attendedIcon||""}</td>
    <td>${p.waitingIcon||""}</td>
    <td>${p.cancelledIcon||""}</td>

    <td></td>
    <td class="clickable"></td>
    <td class="clickable"></td>
    <td></td>
  `;

  const c = tr.children;

  /* PAYMENT */
  c[12].textContent = payIcon(p.paymentIndicator);
  c[12].onclick = ()=>{
    let next =
      p.paymentIndicator==="PAID"?"NOT PAID":
      p.paymentIndicator==="NOT PAID"?"ON-WAITING PAYMENT":"PAID";

    let fd = new FormData();
    fd.append("action","payment");
    fd.append("rowIndex",p.rowIndex);
    fd.append("value",next);
    fd.append("sheet",SHEET);

    fetch(BASE_URL,{method:"POST",body:fd});
  };

  /* ATTENDANCE */
  c[13].textContent = attIcon(p.attendanceStatus);
  c[13].onclick = ()=>{
    let next =
      p.attendanceStatus==="Attended"?"Cancelled":
      p.attendanceStatus==="Cancelled"?"ON-waiting":"Attended";

    let fd = new FormData();
    fd.append("action","attendance");
    fd.append("rowIndex",p.rowIndex);
    fd.append("status",next);
    fd.append("sheet",SHEET);

    fetch(BASE_URL,{method:"POST",body:fd});
  };

  /* SHIRT */
  c[17].innerHTML = `
    <select>
      <option>XS</option><option>S</option><option>M</option>
      <option>L</option><option>XL</option><option>XXL</option>
    </select>
  `;
  c[17].querySelector("select").value = p.shirt || "";

  c[17].querySelector("select").onchange = (e)=>{
    let fd = new FormData();
    fd.append("action","shirt");
    fd.append("rowIndex",p.rowIndex);
    fd.append("value",e.target.value);
    fd.append("sheet",SHEET);
    fetch(BASE_URL,{method:"POST",body:fd});
  };

  /* KIT */
  c[18].textContent = p.kit;
  c[18].onclick = ()=>{
    let next = p.kit==="❌"?"🟠":p.kit==="🟠"?"✅":"❌";

    let fd = new FormData();
    fd.append("action","kit");
    fd.append("rowIndex",p.rowIndex);
    fd.append("state",next);
    fd.append("sheet",SHEET);

    fetch(BASE_URL,{method:"POST",body:fd});
  };

  /* AIRCON */
  c[19].textContent = p.aircon;
  c[19].onclick = ()=>{
    let next = p.aircon==="❌"?"🟠":p.aircon==="🟠"?"✅":"❌";

    let fd = new FormData();
    fd.append("action","aircon");
    fd.append("rowIndex",p.rowIndex);
    fd.append("state",next);
    fd.append("sheet",SHEET);

    fetch(BASE_URL,{method:"POST",body:fd});
  };

  /* ROOM_AC */
  c[20].innerHTML = `
    <select>
      <option value="">--A/C Room--</option>
      ${AC_ROOMS.map(r=>{
        let count = roomMap[r] || 0;
        let full = count >= 18;

        return `<option value="${r}"
          ${p.room_ac===r?"selected":""}
          ${full?"disabled":""}>
          ${r} (${count}/18)
        </option>`;
      }).join("")}
    </select>
  `;

  c[20].querySelector("select").onchange = (e)=>{
    let val = e.target.value;

    let fd = new FormData();
    fd.append("action","room_ac");
    fd.append("rowIndex",p.rowIndex);
    fd.append("value",val);
    fd.append("sheet",SHEET);

    fetch(BASE_URL,{method:"POST",body:fd});

    p.room_ac = val;
    updateRoomStats(allData);
  };

  tbody.appendChild(tr);
}

/* ===================== */
/* LOAD */
/* ===================== */
async function loadData(){

  const res = await fetch(BASE_URL+"?sheet="+SHEET);
  const data = await res.json();

  allData = data;

  updateRoomStats(allData);

  tbody.innerHTML = "";
  allData.forEach(render);

  updateStats(allData);
}

loadData();
setInterval(loadData,60000);

</script>

</body>
</html>
