<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance System</title>

<style>
body{
  font-family:Segoe UI;
  background:#0f0f0f;
  color:white;
  margin:0;
  padding:10px;
}

h1{text-align:center;color:#ff6a00}
.sub{text-align:center;color:#aaa}

.stats{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.box{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  min-width:120px;
  text-align:center;
}

.box span{color:#ff6a00;font-weight:bold}

#roomStats{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  font-size:13px;
}

table{
  width:100%;
  min-width:1800px;
  border-collapse:collapse;
}

th{
  background:#1a1a1a;
  color:#ff6a00;
  padding:10px;
  position:sticky;
  top:0;
}

td{
  background:#121212;
  border:1px solid #222;
  padding:6px;
  text-align:center;
}

select{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  padding:5px;
  border-radius:6px;
}

.clickable{cursor:pointer}
.clickable:active{transform:scale(0.9)}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE</h1>
<div class="sub">FEBIAS SYSTEM</div>

<div class="stats">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Paid<br><span id="paid">0</span></div>
  <div class="box">Waiting<br><span id="waiting">0</span></div>
</div>

<div id="roomStats"></div>

<table>
<thead>
<tr>
  <th>#</th><th>Name</th><th>Room</th><th>ROOM_AC</th>
  <th>Payment</th><th>Attendance</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const BASE_URL="https://script.google.com/macros/s/AKfycbxNQDvbtcnYF0Bhw0xwEp_2diIT6my0Z-YdUjD45G1mhdtkTc1eYFfH6kgMm_sPISt76g/exec";
const SHEET="Pre-Registration";

/* AC ROOMS */
const AC_ROOMS=[
"Berean – Abraham 2",
"Berean – Joshua 3",
"Berean – Elijah 3",
"Berean – Elisha 3",
"Sharon – Deborah 2",
"Sharon – Martha 3",
"Sharon – Abigail 2",
"Sharon – Eve 2"
];

let dataStore=[];
let map=new Map();
let roomCount={};

let queue=[],running=false;
function send(fd){queue.push(fd);run();}
async function run(){
 if(running) return;
 running=true;
 while(queue.length){
  await fetch(BASE_URL,{method:"POST",body:queue.shift()});
 }
 running=false;
}

/* ICONS */
const pay=v=>v==="PAID"?"✅":v==="ON-WAITING PAYMENT"?"🟠":"❌";
const att=v=>v==="Attended"?"✅":v==="ON-waiting"?"🟠":"❌";

/* STATS */
function stats(d){
 let t=0,p=0,w=0;
 d.forEach(x=>{
  t++;
  if(x.paymentIndicator==="PAID")p++;
  if(x.paymentIndicator==="ON-WAITING PAYMENT")w++;
 });
 total.textContent=t;
 paid.textContent=p;
 waiting.textContent=w;
}

/* ROOM COUNT + COLORS */
function roomStats(d){

 roomCount={};
 AC_ROOMS.forEach(r=>roomCount[r]=0);

 d.forEach(x=>{
  if(roomCount[x.room_ac]!=null){
   roomCount[x.room_ac]++;
  }
 });

 let html="<b>A/C ROOMS</b><br>";

 AC_ROOMS.forEach(r=>{
  let n=roomCount[r]||0;

  let color=
   n>=18?"🔴":
   n>=15?"🟠":"🟢";

  html+=`${color} ${r}: ${n}/18<br>`;
 });

 roomStatsBox.innerHTML=html;
}

/* CHECK IF FULL */
function isFull(room){
 return (roomCount[room]||0)>=18;
}

/* RENDER */
function render(p){

 let tr=map.get(p.rowIndex);
 if(!tr){
  tr=document.createElement("tr");
  tr.innerHTML="<td></td><td></td><td></td><td></td><td></td><td></td>";
  tbody.appendChild(tr);
  map.set(p.rowIndex,tr);
 }

 const c=tr.children;

 c[0].textContent=p.rowIndex;
 c[1].textContent=(p.firstName+" "+p.lastName);
 c[2].textContent=p.room;

 /* ROOM_AC (FIXED + LOCKED WHEN FULL) */
 let disabled=isFull(p.room_ac)&&p.room_ac!==p.room_ac;

 c[3].innerHTML=`
 <select onchange="setRoomAC(${p.rowIndex},this.value)">
 <option value="">--AC ROOM--</option>
 ${AC_ROOMS.map(r=>`
 <option value="${r}" ${p.room_ac===r?"selected":""} ${isFull(r)&&p.room_ac!==r?"disabled":""}>
 ${r} ${isFull(r)&&p.room_ac!==r?"(FULL)":""}
 </option>
 `).join("")}
 </select>`;

 c[4].textContent=pay(p.paymentIndicator);
 c[5].textContent=att(p.attendanceStatus);
}

/* ROOM AC UPDATE (OPTIMIZED) */
function setRoomAC(row,val){

 let old=dataStore.find(x=>x.rowIndex===row);

 if(old) old.room_ac=val;

 renderOptimistic();

 send(fd("room_ac",row,val));
}

/* OPTIMISTIC FAST UI */
function renderOptimistic(){
 tbody.innerHTML="";
 map.clear();
 dataStore.forEach(render);
 stats(dataStore);
 roomStats(dataStore);
}

/* FORM */
function fd(a,r,v){
 let f=new FormData();
 f.append("action",a);
 f.append("rowIndex",r);
 f.append("value",v);
 f.append("sheet",SHEET);
 return f;
}

/* LOAD */
async function loadData(){
 const res=await fetch(BASE_URL+"?sheet="+SHEET);
 dataStore=await res.json();

 renderOptimistic();
}

/* INIT */
setInterval(loadData,60000);
loadData();

</script>

</body>
</html>
