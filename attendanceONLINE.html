<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="refine.ico">
<title>YLC 2026 Attendance System</title>

<style>
body{
  font-family:Segoe UI,sans-serif;
  background:#0f0f0f;
  color:white;
  margin:0;
  padding:10px;
}

h1{ text-align:center; color:#ff6a00; }

.sub{ text-align:center; color:#aaa; }

.stats{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  min-width:140px;
  text-align:center;
  border:1px solid #333;
}

.box span{ color:#ff6a00; font-weight:bold; }

.table-wrap{ overflow-x:auto; }

table{
  width:100%;
  min-width:1800px;
  border-collapse:collapse;
}

th{
  background:#1a1a1a;
  color:#ff6a00;
  padding:10px;
  position:sticky;
  top:0;
}

td{
  padding:8px;
  border:1px solid #222;
  background:#121212;
  text-align:center;
  font-size:13px;
}

.clickable{
  cursor:pointer;
  font-size:16px;
  transition:0.1s;
}

.clickable:active{
  transform:scale(0.9);
}

select{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  padding:5px;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE SYSTEM</h1>
<div class="sub">FEBIAS College of Bible System</div>

<div class="stats">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Paid<br><span id="paid">0</span></div>
  <div class="box">Waiting<br><span id="waiting">0</span></div>
</div>

<div id="roomStats" style="margin:10px 0;background:#1a1a1a;padding:10px;border-radius:10px;"></div>

<button onclick="loadData()">🔄 REFRESH</button>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th>#</th>
  <th>Name</th>
  <th>Gender</th>
  <th>Room</th>

  <th>Payment</th>
  <th>Amount</th>

  <th>Mode</th>

  <th>PAY</th>
  <th>ATT</th>

  <th>Shirt</th>
  <th>Kit</th>
  <th>Aircon</th>

  <th>ROOM_AC</th>
</tr>
</thead>

<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbz2KwC7F750vELj7GgoAKxTxQqxsa_Gr6k78rGkUkyvRtilxisU3BYJGVce2Fn6J8pS/exec";
const SHEET = "Pre-Registration";

const AC_ROOMS = [
  "Berean Area",
  "Berean – Abraham 2",
  "Berean – Joshua 3",
  "Berean – Elijah 3",
  "Berean – Elisha 3",
  "Sharon – Deborah 2",
  "Sharon – Martha 3",
  "Sharon – Abigail 2",
  "Sharon – Eve 2"
];

let tbody = document.querySelector("tbody");
let allData = [];

/* ICONS */
function payIcon(v){
  if(v==="PAID") return "✅ PAID";
  if(v==="ON-WAITING PAYMENT") return "🟠 WAITING";
  return "❌ NOT PAID";
}

function attIcon(v){
  if(v==="Attended") return "✔ ATTENDED";
  if(v==="ON-waiting") return "🟠 WAITING";
  return "❌ CANCELLED";
}

/* STATS */
function updateStats(data){
  let paid=0, waiting=0;

  data.forEach(p=>{
    if(p.paymentIndicator==="PAID") paid++;
    if(p.paymentIndicator==="ON-WAITING PAYMENT") waiting++;
  });

  document.getElementById("total").textContent = data.length;
  document.getElementById("paid").textContent = paid;
  document.getElementById("waiting").textContent = waiting;
}

/* ROOM AC */
function updateRoomStats(data){
  let map = {};
  AC_ROOMS.forEach(r=>map[r]=0);

  data.forEach(p=>{
    if(map[p.room_ac] !== undefined){
      map[p.room_ac]++;
    }
  });

  let html = "<b>ROOM AC STATUS</b><br>";
  AC_ROOMS.forEach(r=>{
    html += `${r}: ${map[r]||0}/18<br>`;
  });

  document.getElementById("roomStats").innerHTML = html;
}

/* RENDER */
function render(p){
  let tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${p.rowIndex}</td>
    <td>${p.firstName} ${p.lastName}</td>
    <td>${p.gender}</td>
    <td>${p.room}</td>

    <td class="paytxt">${payIcon(p.paymentIndicator)}</td>
    <td class="amt">${p.amount || ""}</td>

    <td>
      <select class="mode">
        <option ${p.modeOfPayment==="Onsite"?"selected":""}>Onsite</option>
        <option ${p.modeOfPayment==="GCASH"?"selected":""}>GCASH</option>
        <option ${p.modeOfPayment==="BANK"?"selected":""}>BANK</option>
      </select>
    </td>

    <td class="clickable pay">${payIcon(p.paymentIndicator)}</td>
    <td class="clickable att">${attIcon(p.attendanceStatus)}</td>

    <td>
      <select class="shirt">
        <option>S</option><option>M</option><option>L</option>
      </select>
    </td>

    <td class="clickable kit">${p.kit||"❌"}</td>
    <td class="clickable aircon">${p.aircon||"❌"}</td>

    <td>
      <select class="roomac">
        <option value="">ROOM AC</option>
        ${AC_ROOMS.map(r=>`<option ${p.room_ac===r?"selected":""}>${r}</option>`).join("")}
      </select>
    </td>
  `;

  tbody.appendChild(tr);

  const payBtn = tr.querySelector(".pay");
  const amt = tr.querySelector(".amt");

  /* PAYMENT (INSTANT ₱1500) */
  payBtn.onclick = ()=>{
    let next = p.paymentIndicator==="PAID" ? "NOT PAID" : "PAID";
    p.paymentIndicator = next;

    payBtn.textContent = payIcon(next);

    if(next==="PAID"){
      amt.textContent = "₱1500";
    } else {
      amt.textContent = "";
    }

    send("payment",{rowIndex:p.rowIndex,value:next});
  };

  /* MODE */
  tr.querySelector(".mode").onchange = (e)=>{
    send("mode",{rowIndex:p.rowIndex,value:e.target.value});
  };

  /* KIT */
  tr.querySelector(".kit").onclick = ()=>{
    let next = p.kit==="❌"?"🟠":p.kit==="🟠"?"✅":"❌";
    p.kit = next;
    tr.querySelector(".kit").textContent = next;
    send("kit",{rowIndex:p.rowIndex,state:next});
  };

  /* AIRCON */
  tr.querySelector(".aircon").onclick = ()=>{
    let next = p.aircon==="❌"?"🟠":p.aircon==="🟠"?"✅":"❌";
    p.aircon = next;
    tr.querySelector(".aircon").textContent = next;
    send("aircon",{rowIndex:p.rowIndex,state:next});
  };

  /* ROOM AC */
  tr.querySelector(".roomac").onchange = (e)=>{
    send("room_ac",{rowIndex:p.rowIndex,value:e.target.value});
  };

  /* SHIRT */
  tr.querySelector(".shirt").value = p.shirt||"";
  tr.querySelector(".shirt").onchange = (e)=>{
    send("shirt",{rowIndex:p.rowIndex,value:e.target.value});
  };
}

/* SEND */
function send(action,data){
  let fd = new FormData();
  fd.append("action",action);

  for(let k in data){
    fd.append(k,data[k]);
  }

  fetch(BASE_URL,{method:"POST",body:fd});
}

/* LOAD */
async function loadData(){
  const res = await fetch(BASE_URL+"?sheet="+SHEET);
  allData = await res.json();

  tbody.innerHTML="";
  allData.forEach(render);

  updateStats(allData);
  updateRoomStats(allData);
}

loadData();
setInterval(loadData,60000);

</script>

</body>
</html>
