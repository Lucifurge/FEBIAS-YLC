<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance | FEBIAS College of Bible</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #f8f8f8;
  color: #1f2937;
  padding: 2rem;
}

h1 { text-align: center; color: #0b3d2e; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1.5rem;
}

th, td {
  border: 1px solid #ccc;
  padding: 0.8rem;
}

th {
  background: #0b3d2e;
  color: white;
}

.status-paid { color: green; font-weight: bold; }
.status-onsite { color: orange; font-weight: bold; }
.status-not { color: red; font-weight: bold; }

.payment, .attendance {
  cursor: pointer;
  text-align: center;
  font-size: 1.4rem;
}
</style>
</head>

<body>

<h1>YLC 2026 Attendance</h1>

<!-- 🔥 INDICATORS ADDED -->
<div style="text-align:center; margin-bottom: 1rem; font-size: 14px; color:#444;">

  <p><b>Attendance:</b> 
    🟠 ON-WAITING | 
    ✅ ATTENDED | 
    ❌ CANCELLED
  </p>

  <p><b>Payment:</b> 
    ❌ NOT PAID | 
    🟠 ONSITE PAYMENT | 
    ✅ ONLINE PAYMENT
  </p>

</div>

<p style="text-align:center;">Click emojis to update Attendance and Payment separately.</p>

<button onclick="loadAttendance()">🔄 Refresh Now</button>

<table id="attendance-table">
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment</th>
<th>Attendance</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbzaecw9qr0DVujJZyj89u-PnoXKlwhfEMlmdpciQrssRl6fVd26iLicJuzMhqHyob98ew/exec";
const SHEET_NAME = "Pre-Registration";
const tbody = document.querySelector("tbody");

let peopleMap = new Map();
let localOverrides = new Map();

const attendanceCycle = ["ON-waiting", "Attended", "Cancelled"];
const paymentCycle = ["Not Paid", "Onsite", "Online"];

// ===============================
// RENDER ROW
// ===============================
function renderRow(person) {

  let tr = peopleMap.get(person.rowIndex);

  if (!tr) {
    tr = document.createElement("tr");
    tr.dataset.row = person.rowIndex;
    tr.dataset.locked = "false";

    tr.innerHTML = `
      <td class="first"></td>
      <td class="last"></td>
      <td class="payment"></td>
      <td class="attendance"></td>
    `;

    tbody.appendChild(tr);
    peopleMap.set(person.rowIndex, tr);
  }

  tr.querySelector(".first").textContent = person.firstName || "";
  tr.querySelector(".last").textContent = person.lastName || "";

  const paymentCell = tr.querySelector(".payment");
  const attendanceCell = tr.querySelector(".attendance");

  // ===============================
  // PAYMENT (INDEPENDENT)
  // ===============================
  let paymentState =
    person.paymentStatus?.includes("Online") ? "Online" :
    person.paymentStatus?.includes("Onsite") ? "Onsite" :
    "Not Paid";

  function setPaymentUI(state) {
    paymentCell.textContent =
      state === "Online" ? "✅" :
      state === "Onsite" ? "🟠" :
      "❌";

    paymentCell.className =
      state === "Online" ? "payment status-paid" :
      state === "Onsite" ? "payment status-onsite" :
      "payment status-not";
  }

  setPaymentUI(paymentState);

  paymentCell.onclick = async () => {
    if (tr.dataset.locked === "true") return;
    tr.dataset.locked = "true";

    let idx = paymentCycle.indexOf(paymentState);
    if (idx === -1) idx = 0;

    paymentState = paymentCycle[(idx + 1) % paymentCycle.length];
    setPaymentUI(paymentState);

    const formData = new FormData();
    formData.append("action", "payment");
    formData.append("rowIndex", person.rowIndex);
    formData.append("payment_by", paymentState);
    formData.append("sheet", SHEET_NAME);

    try {
      await fetch(BASE_URL, { method: "POST", body: formData });
    } catch (err) {
      console.error(err);
    } finally {
      tr.dataset.locked = "false";
    }
  };

  // ===============================
  // ATTENDANCE (INDEPENDENT)
  // ===============================
  function setAttendanceUI(state) {
    attendanceCell.textContent =
      state === "Attended" ? "✅" :
      state === "Cancelled" ? "❌" :
      "🟠";
  }

  let attendanceState =
    localOverrides.get(person.rowIndex) ||
    person.attendanceStatus ||
    "ON-waiting";

  setAttendanceUI(attendanceState);

  attendanceCell.onclick = async () => {
    if (tr.dataset.locked === "true") return;
    tr.dataset.locked = "true";

    let idx = attendanceCycle.indexOf(attendanceState);
    if (idx === -1) idx = 0;

    attendanceState = attendanceCycle[(idx + 1) % attendanceCycle.length];

    localOverrides.set(person.rowIndex, attendanceState);
    setAttendanceUI(attendanceState);

    const formData = new FormData();
    formData.append("action", "attendance");
    formData.append("rowIndex", person.rowIndex);
    formData.append("attendance_status", attendanceState);
    formData.append("sheet", SHEET_NAME);

    try {
      await fetch(BASE_URL, { method: "POST", body: formData });
    } catch (err) {
      console.error(err);
    } finally {
      tr.dataset.locked = "false";
    }
  };
}

// ===============================
// LOAD DATA
// ===============================
async function loadAttendance() {
  try {
    const res = await fetch(BASE_URL + "?sheet=" + SHEET_NAME);
    const data = await res.json();

    if (!Array.isArray(data)) return;

    tbody.innerHTML = "";
    peopleMap.clear();

    data.forEach(renderRow);

  } catch (err) {
    console.error(err);
  }
}

document.querySelector("button").onclick = loadAttendance;
setInterval(loadAttendance, 15000);
loadAttendance();
</script>

</body>
</html>
