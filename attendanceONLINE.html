<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance | FEBIAS College of Bible</title>

<link rel="icon" href="logo.ico">

<style>
body{
font-family:"Segoe UI",system-ui,sans-serif;
background:#f8f8f8;
color:#1f2937;
padding:2rem;
}

h1{text-align:center;color:#0b3d2e;}

table{
width:100%;
border-collapse:collapse;
margin-top:1.5rem;
}

th,td{
border:1px solid #ccc;
padding:0.8rem;
}

th{
background:#0b3d2e;
color:white;
}

.status-paid{color:green;font-weight:bold;}
.status-onsite{color:orange;font-weight:bold;}
.status-not{color:red;font-weight:bold;}

.attendance-check{
cursor:pointer;
text-align:center;
font-size:1.4rem;
user-select:none;
}

.attendance-check:hover{
transform:scale(1.2);
}
</style>
</head>

<body>

<h1>YLC 2026 Attendance</h1>
<p>Click the emoji to update attendance (✅ = Attended, 🟠 = Waiting, ❌ = Cancelled).</p>

<button onclick="manualRefresh()">🔄 Refresh Now</button>

<table id="attendance-table">
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment Status</th>
<th>Attendance</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbw43IxCOZWnOUQrew5tjQEKsvHIKIRmzT4KgrBAJbC8oKgt08ICBtfJmZcfo8-1NDTAIA/exec";

const tbody=document.querySelector("#attendance-table tbody");

const rows=new Map();
const overrides=new Map();

const STATUS=["ON-waiting","Attended","Cancelled"];

let loading=false;


/* emoji */
function emoji(s){
 if(s==="Attended") return "✅";
 if(s==="Cancelled") return "❌";
 return "🟠";
}


/* payment */
function payment(cell,status){

 const s=(status||"").toLowerCase();

 if(s.includes("online")){
  cell.textContent="✅ Paid";
  cell.className="status-paid";
 }
 else if(s.includes("onsite")){
  cell.textContent="🟠 Waiting";
  cell.className="status-onsite";
 }
 else{
  cell.textContent="❌ Not Paid";
  cell.className="status-not";
 }

}


/* create row only once */
function createRow(person){

 const tr=document.createElement("tr");

 tr.innerHTML=`
 <td class="first"></td>
 <td class="last"></td>
 <td class="payment"></td>
 <td class="attendance-check"></td>
 `;

 const attend=tr.querySelector(".attendance-check");
 const pay=tr.querySelector(".payment");

 attend.addEventListener("click",()=>{

  let current=overrides.get(person.rowIndex) || tr.dataset.status || "ON-waiting";

  let i=STATUS.indexOf(current);
  if(i<0)i=0;

  const next=STATUS[(i+1)%STATUS.length];

  overrides.set(person.rowIndex,next);

  tr.dataset.status=next;

  attend.textContent=emoji(next);

  if(next==="Attended") payment(pay,"online");
  else if(next==="ON-waiting") payment(pay,"onsite");
  else payment(pay,"none");

  const form=new FormData();

  form.append("action","attendance");
  form.append("rowIndex",person.rowIndex);
  form.append("attendance_status",next);
  form.append("sheet","ylc");

  fetch(BASE_URL,{method:"POST",body:form})
   .then(()=>setTimeout(()=>overrides.delete(person.rowIndex),3000))
   .catch(e=>console.error(e));

 });

 tbody.appendChild(tr);

 rows.set(person.rowIndex,tr);

 return tr;
}


/* update row */
function updateRow(person){

 let tr=rows.get(person.rowIndex);

 if(!tr) tr=createRow(person);

 const first=tr.querySelector(".first");
 const last=tr.querySelector(".last");
 const pay=tr.querySelector(".payment");
 const attend=tr.querySelector(".attendance-check");

 const status=overrides.get(person.rowIndex) || person.attendanceStatus || "ON-waiting";

 tr.dataset.status=status;

 first.textContent=person.firstName || "";
 last.textContent=person.lastName || "";

 payment(pay,person.paymentStatus);

 attend.textContent=emoji(status);

}


/* load data */
async function loadAttendance(){

 if(loading) return;

 loading=true;

 try{

  const res=await fetch(BASE_URL+"?sheet=ylc",{cache:"no-store"});
  const data=await res.json();

  if(!Array.isArray(data)) return;

  const active=new Set();

  data.forEach(p=>{
   active.add(p.rowIndex);
   updateRow(p);
  });

  rows.forEach((tr,id)=>{
   if(!active.has(id)){
    tr.remove();
    rows.delete(id);
   }
  });

 }
 catch(e){
  console.error(e);
 }

 loading=false;

}


/* manual refresh */
function manualRefresh(){
 loadAttendance();
}


loadAttendance();

/* refresh every 10 seconds */
setInterval(loadAttendance,10000);

</script>

</body>
</html>
