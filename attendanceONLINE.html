<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance Online</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f0f0f;
  color: #ffffff;
  padding: 1rem;
  margin: 0;
}

h1 {
  text-align: center;
  color: #ff6a00;
  font-size: 1.3rem;
}

.sub {
  text-align: center;
  color: #bbb;
  font-size: 0.85rem;
}

/* STATS */
.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 15px 0;
}

.box {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  text-align: center;
  flex: 1 1 120px;
  font-size: 0.85rem;
}

.box span {
  color: #ff6a00;
  font-weight: bold;
}

/* BUTTON */
button {
  width: 100%;
  max-width: 320px;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff6a00, #ff2e00);
  color: white;
}

/* DESKTOP TABLE */
.table-wrap {
  width: 100%;
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 600px;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #1a1a1a;
  color: #ff6a00;
  padding: 10px;
}

td {
  border: 1px solid #222;
  padding: 8px;
  background: #121212;
  text-align: center;
}

.payment, .attendance, .kit {
  font-size: 1.2rem;
  cursor: pointer;
}

/* MOBILE CARD MODE */
@media (max-width: 600px) {

  table, thead {
    display: none;
  }

  tbody {
    display: block;
  }

  tr {
    display: block;
    background: #121212;
    margin-bottom: 10px;
    border-radius: 10px;
    padding: 10px;
    border: 1px solid #222;
  }

  td {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border: none;
    font-size: 0.85rem;
  }

  td::before {
    content: attr(data-label);
    color: #aaa;
  }

  .payment, .attendance, .kit {
    font-size: 1.1rem;
  }
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE ONLINE</h1>
<div class="sub">FEBIAS College of Bible System</div>

<div class="stats">
  <div class="box">Total Members<br><span id="totalCount">0</span></div>
  <div class="box">Countdown<br><span id="countdown">Loading...</span></div>
</div>

<button onclick="loadAttendance()">🔥 REFRESH DATA</button>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment</th>
<th>Attendance</th>
<th>Kit</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "YOUR_SCRIPT_URL_HERE";
const SHEET_NAME = "Pre-Registration";

const tbody = document.querySelector("tbody");

let peopleMap = new Map();

const kitCycle = ["❌","🟠","✅"];

// ===============================
function updateStats(data) {
  document.getElementById("totalCount").textContent = data.length;
}

// ===============================
function startCountdown() {

  const start = new Date("2026-04-16T00:00:00").getTime();
  const end = new Date("2026-04-18T23:59:59").getTime();

  setInterval(() => {
    const now = Date.now();

    let target, label;

    if (now < start) {
      target = start;
      label = "STARTS IN";
    } else if (now <= end) {
      target = end;
      label = "ENDS IN";
    } else {
      document.getElementById("countdown").textContent = "DONE";
      return;
    }

    const d = Math.floor((target - now) / 86400000);
    const h = Math.floor(((target - now) / 3600000) % 24);
    const m = Math.floor(((target - now) / 60000) % 60);
    const s = Math.floor(((target - now) / 1000) % 60);

    document.getElementById("countdown").textContent =
      `${label}: ${d}d ${h}h ${m}m ${s}s`;

  }, 1000);
}

// ===============================
function renderRow(p) {

  let tr = peopleMap.get(p.rowIndex);

  if (!tr) {
    tr = document.createElement("tr");

    tr.innerHTML = `
      <td data-label="First Name"></td>
      <td data-label="Last Name"></td>
      <td data-label="Payment" class="payment"></td>
      <td data-label="Attendance" class="attendance"></td>
      <td data-label="Kit" class="kit"></td>
    `;

    tbody.appendChild(tr);
    peopleMap.set(p.rowIndex, tr);
  }

  tr.children[0].textContent = p.firstName;
  tr.children[1].textContent = p.lastName;

  tr.children[2].textContent =
    p.paymentIndicator === "PAID" ? "✅" :
    p.paymentIndicator === "ON-WAITING PAYMENT" ? "🟠" : "❌";

  tr.children[3].textContent =
    p.attendanceStatus === "Attended" ? "✅" :
    p.attendanceStatus === "Cancelled" ? "❌" : "🟠";

  let kitState = p.kitDistribution || "❌";
  const kitCell = tr.children[4];

  kitCell.textContent = kitState;

  kitCell.onclick = async () => {

    let i = kitCycle.indexOf(kitState);
    if (i === -1) i = 0;

    kitState = kitCycle[(i + 1) % kitCycle.length];
    kitCell.textContent = kitState;

    const fd = new FormData();
    fd.append("action", "kit");
    fd.append("rowIndex", p.rowIndex);
    fd.append("kit_state", kitState);
    fd.append("sheet", SHEET_NAME);

    await fetch(BASE_URL, { method: "POST", body: fd });
  };
}

// ===============================
async function loadAttendance() {
  const res = await fetch(BASE_URL + "?sheet=" + SHEET_NAME);
  const data = await res.json();

  if (!Array.isArray(data)) return;

  tbody.innerHTML = "";
  peopleMap.clear();

  updateStats(data);
  data.forEach(renderRow);
}

document.querySelector("button").onclick = loadAttendance;

setInterval(loadAttendance, 15000);

loadAttendance();
startCountdown();

</script>

</body>
</html>
