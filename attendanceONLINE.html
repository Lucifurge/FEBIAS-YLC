<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance Online</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f0f0f;
  color: #ffffff;
  padding: 2rem;
}

h1 {
  text-align: center;
  color: #ff6a00;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sub {
  text-align: center;
  color: #bbb;
  margin-bottom: 1rem;
}

.indicators {
  text-align: center;
  font-size: 14px;
  color: #ccc;
  margin-bottom: 1rem;
}

button {
  display: block;
  margin: 0 auto 1rem auto;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(45deg, #ff6a00, #ff2e00);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1rem;
  overflow: hidden;
  border-radius: 10px;
}

th {
  background: #1a1a1a;
  color: #ff6a00;
  padding: 12px;
}

td {
  border: 1px solid #222;
  padding: 10px;
  background: #121212;
}

tr:hover td {
  background: #1b1b1b;
}

.payment, .attendance {
  cursor: pointer;
  text-align: center;
  font-size: 1.3rem;
}

.status-paid { color: #00ff88; font-weight: bold; }
.status-onsite { color: #ffb000; font-weight: bold; }
.status-not { color: #ff3b3b; font-weight: bold; }
</style>
</head>

<body>

<h1>YLC 2026 Attendance</h1>
<div class="sub">Online Delegate Management System</div>

<div class="indicators">
  Attendance: 🟠 ON-WAITING | ✅ ATTENDED | ❌ CANCELLED <br>
  Payment: ❌ NOT PAID | 🟠 ON-WAITING PAYMENT | ✅ PAID
</div>

<button onclick="loadAttendance()">🔥 REFRESH DATA</button>

<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment</th>
<th>Attendance</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbyCbc7zJ-nkcIcTWanli5zj1q8PV5dfz1owsK2s7vNHEcfcgWHrkwY-uEZ2J9lfetatdQ/exec";
const SHEET_NAME = "Pre-Registration";

const tbody = document.querySelector("tbody");

let peopleMap = new Map();
let localOverrides = new Map();

const attendanceCycle = ["ON-waiting", "Attended", "Cancelled"];
const paymentCycle = ["NOT PAID", "ON-WAITING PAYMENT", "PAID"];

// ===============================
// RENDER ROW
// ===============================
function renderRow(person) {

  let tr = peopleMap.get(person.rowIndex);

  if (!tr) {
    tr = document.createElement("tr");
    tr.dataset.row = person.rowIndex;
    tr.dataset.locked = "false";

    tr.innerHTML = `
      <td class="first"></td>
      <td class="last"></td>
      <td class="payment"></td>
      <td class="attendance"></td>
    `;

    tbody.appendChild(tr);
    peopleMap.set(person.rowIndex, tr);
  }

  tr.querySelector(".first").textContent = person.firstName || "";
  tr.querySelector(".last").textContent = person.lastName || "";

  const paymentCell = tr.querySelector(".payment");
  const attendanceCell = tr.querySelector(".attendance");

  // PAYMENT
  let paymentState = (person.paymentIndicator || "NOT PAID").toUpperCase();

  function setPaymentUI(state) {
    paymentCell.textContent =
      state === "PAID" ? "✅ PAID" :
      state === "ON-WAITING PAYMENT" ? "🟠 ON-WAITING PAYMENT" :
      "❌ NOT PAID";

    paymentCell.className =
      state === "PAID" ? "payment status-paid" :
      state === "ON-WAITING PAYMENT" ? "payment status-onsite" :
      "payment status-not";
  }

  setPaymentUI(paymentState);

  paymentCell.onclick = async () => {
    if (tr.dataset.locked === "true") return;
    tr.dataset.locked = "true";

    let idx = paymentCycle.indexOf(paymentState);
    if (idx === -1) idx = 0;

    paymentState = paymentCycle[(idx + 1) % paymentCycle.length];
    setPaymentUI(paymentState);

    const formData = new FormData();
    formData.append("action", "payment");
    formData.append("rowIndex", person.rowIndex);
    formData.append("payment_by", paymentState);
    formData.append("sheet", SHEET_NAME);

    try {
      await fetch(BASE_URL, { method: "POST", body: formData });
    } catch (err) {
      console.error(err);
    } finally {
      tr.dataset.locked = "false";
    }
  };

  // ATTENDANCE
  function setAttendanceUI(state) {
    attendanceCell.textContent =
      state === "Attended" ? "✅" :
      state === "Cancelled" ? "❌" :
      "🟠";
  }

  let attendanceState =
    localOverrides.get(person.rowIndex) ||
    person.attendanceStatus ||
    "ON-waiting";

  setAttendanceUI(attendanceState);

  attendanceCell.onclick = async () => {
    if (tr.dataset.locked === "true") return;
    tr.dataset.locked = "true";

    let idx = attendanceCycle.indexOf(attendanceState);
    if (idx === -1) idx = 0;

    attendanceState = attendanceCycle[(idx + 1) % attendanceCycle.length];

    localOverrides.set(person.rowIndex, attendanceState);
    setAttendanceUI(attendanceState);

    const formData = new FormData();
    formData.append("action", "attendance");
    formData.append("rowIndex", person.rowIndex);
    formData.append("attendance_status", attendanceState);
    formData.append("sheet", SHEET_NAME);

    try {
      await fetch(BASE_URL, { method: "POST", body: formData });
    } catch (err) {
      console.error(err);
    } finally {
      tr.dataset.locked = "false";
    }
  };
}

// ===============================
// LOAD DATA (ALPHABETICAL)
// ===============================
async function loadAttendance() {
  try {
    const res = await fetch(BASE_URL + "?sheet=" + SHEET_NAME);
    const data = await res.json();

    if (!Array.isArray(data)) return;

    tbody.innerHTML = "";
    peopleMap.clear();

    data
      .sort((a, b) =>
        (a.firstName || "").toLowerCase()
        .localeCompare((b.firstName || "").toLowerCase())
      )
      .forEach(renderRow);

  } catch (err) {
    console.error(err);
  }
}

document.querySelector("button").onclick = loadAttendance;
setInterval(loadAttendance, 15000);
loadAttendance();

</script>

</body>
</html>
