<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance System</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
  color: #ff6a00;
}

.sub {
  text-align: center;
  color: #aaa;
  margin-bottom: 10px;
}

/* TOP STATS */
.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.box {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  min-width: 140px;
  text-align: center;
}

.box span {
  color: #ff6a00;
  font-weight: bold;
}

/* SEARCH */
.search {
  display: flex;
  justify-content: center;
  margin: 10px 0;
}

.search input {
  width: 100%;
  max-width: 400px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: white;
}

/* TABLE WRAP (IMPORTANT FOR TABLET) */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  border: 1px solid #222;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  min-width: 1600px; /* IMPORTANT so ALL columns fit */
  border-collapse: collapse;
}

th {
  background: #1a1a1a;
  color: #ff6a00;
  padding: 10px;
  position: sticky;
  top: 0;
  z-index: 2;
}

td {
  padding: 8px;
  border: 1px solid #222;
  background: #121212;
  text-align: center;
  font-size: 13px;
}

/* CLICKABLE CELLS */
.clickable {
  cursor: pointer;
  font-size: 18px;
}

/* BUTTON */
button {
  width: 100%;
  max-width: 300px;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg,#ff6a00,#ff2e00);
  color: white;
  font-weight: bold;
}

/* MOBILE MODE */
@media (max-width: 768px) {
  table {
    min-width: 1400px;
  }
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE SYSTEM</h1>
<div class="sub">FEBIAS College of Bible System</div>

<!-- STATS -->
<div class="stats">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Paid<br><span id="paid">0</span></div>
  <div class="box">Waiting<br><span id="waiting">0</span></div>
  <div class="box">Countdown<br><span id="countdown">Loading...</span></div>
</div>

<button onclick="loadData()">🔄 REFRESH</button>

<!-- SEARCH -->
<div class="search">
  <input id="searchBox" placeholder="Search name, church, status..." oninput="filterTable()" />
</div>

<!-- TABLE -->
<div class="table-wrap">
<table>
<thead>
<tr>
  <th>#</th>
  <th>Last Name</th>
  <th>First Name</th>
  <th>Gender</th>
  <th>Age</th>
  <th>Contact</th>
  <th>Church</th>
  <th>Classification</th>
  <th>Room</th>
  <th>Category</th>
  <th>Amount</th>
  <th>Payment</th>
  <th>Payment Indicator</th>
  <th>Attendance</th>
  <th>Attended</th>
  <th>Waiting</th>
  <th>Cancelled</th>
  <th>Shirt</th>
  <th>Kit</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbwWmWuLWg-httkGe4-s7jXmKVftXBnGrN2dSoXhc5mQm7AbSRHj_5dH-pWtImuJHdIdDA/exec";
const SHEET = "Pre-Registration";

const tbody = document.querySelector("tbody");
let map = new Map();
let allData = [];

/* STATS */
function updateStats(data){
  let paid = 0, waiting = 0;

  data.forEach(p=>{
    if(p.paymentIndicator === "PAID") paid++;
    else waiting++;
  });

  document.getElementById("total").textContent = data.length;
  document.getElementById("paid").textContent = paid;
  document.getElementById("waiting").textContent = waiting;
}

/* SORT */
function sortData(data){
  return data.sort((a,b)=>
    (a.lastName||"").localeCompare(b.lastName||"")
  );
}

/* RENDER ROW */
function render(p){

  let tr = map.get(p.rowIndex);

  if(!tr){
    tr = document.createElement("tr");
    tr.innerHTML = `
      <td></td><td></td><td></td><td></td><td></td>
      <td></td><td></td><td></td><td></td><td></td>
      <td></td><td class="clickable"></td>
      <td></td><td class="clickable"></td>
      <td class="clickable"></td>
      <td class="clickable"></td>
      <td class="clickable"></td>
      <td></td>
      <td class="clickable"></td>
    `;
    tbody.appendChild(tr);
    map.set(p.rowIndex,tr);
  }

  const c = tr.children;

  c[0].textContent = p.rowIndex;
  c[1].textContent = p.lastName;
  c[2].textContent = p.firstName;
  c[3].textContent = p.gender;
  c[4].textContent = p.age;
  c[5].textContent = p.contact;
  c[6].textContent = p.church;
  c[7].textContent = p.classification;
  c[8].textContent = p.room;
  c[9].textContent = p.category;
  c[10].textContent = p.amount;

  /* PAYMENT CLICK */
  c[11].textContent =
    p.paymentIndicator === "PAID" ? "✅" :
    p.paymentIndicator === "ON-WAITING PAYMENT" ? "🟠" : "❌";

  c[11].onclick = async ()=>{
    let val =
      p.paymentIndicator === "PAID" ? "NOT PAID" :
      p.paymentIndicator === "NOT PAID" ? "WAITING" : "PAID";

    const fd = new FormData();
    fd.append("action","payment");
    fd.append("rowIndex",p.rowIndex);
    fd.append("payment_by",val);
    fd.append("sheet",SHEET);

    await fetch(BASE_URL,{method:"POST",body:fd});
    loadData();
  };

  c[12].textContent = p.paymentIndicator;

  /* ATTENDANCE */
  c[13].textContent = p.attendanceStatus;

  c[13].onclick = async ()=>{
    const next =
      p.attendanceStatus === "Attended" ? "Cancelled" :
      p.attendanceStatus === "Cancelled" ? "ON-waiting" : "Attended";

    const fd = new FormData();
    fd.append("action","attendance");
    fd.append("rowIndex",p.rowIndex);
    fd.append("attendance_status",next);
    fd.append("sheet",SHEET);

    await fetch(BASE_URL,{method:"POST",body:fd});
    loadData();
  };

  c[14].textContent = p.attendedIcon;
  c[15].textContent = p.waitingIcon;
  c[16].textContent = p.cancelledIcon;

  c[17].textContent = p.shirt_size;

  /* KIT */
  c[18].textContent = p.kitDistribution || "❌";

  c[18].onclick = async ()=>{
    let next =
      p.kitDistribution === "❌" ? "🟠" :
      p.kitDistribution === "🟠" ? "✅" : "❌";

    const fd = new FormData();
    fd.append("action","kit");
    fd.append("rowIndex",p.rowIndex);
    fd.append("kit_state",next);
    fd.append("sheet",SHEET);

    await fetch(BASE_URL,{method:"POST",body:fd});
    loadData();
  };
}

/* FILTER */
function filterTable(){
  const q = document.getElementById("searchBox").value.toLowerCase();

  document.querySelectorAll("tbody tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(q)
      ? ""
      : "none";
  });
}

/* COUNTDOWN */
function countdown(){
  const start = new Date("2026-04-16").getTime();
  const end = new Date("2026-04-18").getTime();

  setInterval(()=>{
    const now = Date.now();
    let target = now < start ? start : end;

    const d = Math.floor((target-now)/86400000);
    const h = Math.floor((target-now)/3600000)%24;

    document.getElementById("countdown").textContent =
      now < start ? `STARTS IN ${d}d ${h}h` : `ENDS IN ${d}d ${h}h`;
  },1000);
}

/* LOAD */
async function loadData(){
  const res = await fetch(BASE_URL+"?sheet="+SHEET);
  const data = await res.json();

  if(!Array.isArray(data)) return;

  allData = sortData(data);

  tbody.innerHTML = "";
  map.clear();

  updateStats(allData);

  allData.forEach(render);
}

setInterval(loadData,15000);

loadData();
countdown();

</script>

</body>
</html>
