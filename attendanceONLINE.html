<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance System</title>
<link rel="icon" href="refine.ico">

<style>
body{
  font-family:Segoe UI;
  background:#0f0f0f;
  color:white;
  margin:0;
  padding:10px;
}

h1{text-align:center;color:#ff6a00}
.sub{text-align:center;color:#aaa}

.legend,.stats{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:10px 0;
}

.box,.legend-box{
  background:#1a1a1a;
  border:1px solid #333;
  padding:10px;
  border-radius:10px;
  min-width:140px;
  text-align:center;
}

.box span{color:#ff6a00;font-weight:bold}

#roomStats{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}

.search{
  display:flex;
  justify-content:center;
}

.search input{
  width:100%;
  max-width:400px;
  padding:10px;
  border-radius:8px;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
}

table{
  width:100%;
  min-width:1700px;
  border-collapse:collapse;
}

th{
  position:sticky;
  top:0;
  background:#1a1a1a;
  color:#ff6a00;
  padding:10px;
}

td{
  border:1px solid #222;
  background:#121212;
  padding:8px;
  text-align:center;
  font-size:13px;
}

.clickable{
  cursor:pointer;
  font-size:18px;
  transition:0.1s;
}
.clickable:active{transform:scale(0.9)}

select{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  padding:5px;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE</h1>
<div class="sub">FEBIAS System</div>

<div class="legend">
  <div class="legend-box">❌ Not Paid</div>
  <div class="legend-box">🟠 Waiting</div>
  <div class="legend-box">✅ Paid</div>
</div>

<div class="stats">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Paid<br><span id="paid">0</span></div>
  <div class="box">Waiting<br><span id="waiting">0</span></div>
  <div class="box">Countdown<br><span id="countdown">Loading...</span></div>
</div>

<div id="roomStats"></div>

<button onclick="loadData()">🔄 REFRESH</button>

<div class="search">
  <input id="searchBox" oninput="filterTable()" placeholder="Search">
</div>

<table>
<thead>
<tr>
  <th>#</th><th>Last</th><th>First</th><th>Gender</th><th>Age</th>
  <th>Contact</th><th>Church</th><th>Class</th><th>Room</th>
  <th>Payment Cat</th><th>Amount</th><th>Mode</th>
  <th>PAY</th><th>ATT</th>
  <th>✔</th><th>🟠</th><th>❌</th>
  <th>Kit</th><th>Aircon</th><th>Room_AC</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const BASE_URL="https://script.google.com/macros/s/AKfycbxNQDvbtcnYF0Bhw0xwEp_2diIT6my0Z-YdUjD45G1mhdtkTc1eYFfH6kgMm_sPISt76g/exec";
const SHEET="Pre-Registration";

const AC_ROOMS=[
"Berean Area","Berean – Abraham 2","Berean – Joshua 3",
"Berean – Elijah 3","Berean – Elisha 3",
"Sharon – Deborah 2","Sharon – Martha 3",
"Sharon – Abigail 2","Sharon – Eve 2"
];

const tbody=document.querySelector("tbody");
let map=new Map(), allData=[];

/* FAST QUEUE */
let queue=[],running=false;
function send(fd){queue.push(fd);run();}
async function run(){
 if(running) return;
 running=true;
 while(queue.length){
  await fetch(BASE_URL,{method:"POST",body:queue.shift()});
 }
 running=false;
}

/* ICONS */
const pay=v=>v==="PAID"?"✅ PAID":v==="ON-WAITING PAYMENT"?"🟠 WAITING":"❌ NOT PAID";
const att=v=>v==="Attended"?"✅":v==="ON-waiting"?"🟠":"❌";

/* STATS */
function stats(d){
 let t=d.length,p=0,w=0;
 d.forEach(x=>{
  if(x.paymentIndicator==="PAID")p++;
  if(x.paymentIndicator==="ON-WAITING PAYMENT")w++;
 });
 total.textContent=t;
 paid.textContent=p;
 waiting.textContent=w;
}

/* ROOM + ROOM_AC */
function roomStats(d){
 let c={};
 AC_ROOMS.forEach(r=>c[r]=0);

 d.forEach(x=>{
  if(c[x.room]!=null) c[x.room]++;
 });

 let html="<b>ROOMS</b><br>";
 AC_ROOMS.forEach(r=>{
  let n=c[r]||0;
  html+=`${r}: ${n}/18 ${n>=18?"❌ FULL":""}<br>`;
 });

 roomStatsBox.innerHTML=html;
}

/* RENDER */
function render(p){
 let tr=map.get(p.rowIndex);
 if(!tr){
  tr=document.createElement("tr");
  tr.innerHTML="<td></td>".repeat(20);
  tbody.appendChild(tr);
  map.set(p.rowIndex,tr);
 }

 const c=tr.children;

 c[0].textContent=p.rowIndex;
 c[1].textContent=p.lastName;
 c[2].textContent=p.firstName;
 c[3].textContent=p.gender;
 c[4].textContent=p.age;
 c[5].textContent=p.contact;
 c[6].textContent=p.church;
 c[7].textContent=p.classification;

 c[8].textContent=p.room;

 c[9].textContent=p.paymentCategory;
 c[10].textContent=p.amount;

 /* MODE */
 c[11].innerHTML=`
 <select onchange="mode(${p.rowIndex},this.value)">
 <option>Onsite</option>
 <option>GCASH</option>
 <option>BANK</option>
 <option>Onsite BO</option>
 </select>`;

 c[11].querySelector("select").value=p.modeOfPayment||"Onsite";

 c[12].textContent=pay(p.paymentIndicator);
 c[12].onclick=()=>send(fd("payment",p.rowIndex,p.paymentIndicator==="PAID"?"NOT PAID":"PAID"));

 c[13].textContent=att(p.attendanceStatus);
 c[13].onclick=()=>send(fd("attendance",p.rowIndex,p.attendanceStatus==="Attended"?"Cancelled":"Attended"));

 c[14].textContent=p.attendedIcon;
 c[15].textContent=p.waitingIcon;
 c[16].textContent=p.cancelledIcon;

 c[17].textContent=p.kit;
 c[17].onclick=()=>send(fd("kit",p.rowIndex,p.kit==="❌"?"🟠":"❌"));

 c[18].textContent=p.aircon;
 c[18].onclick=()=>send(fd("aircon",p.rowIndex,p.aircon==="❌"?"🟠":"❌"));

 c[19].textContent=p.room_ac||"";
}

/* FORM DATA */
function fd(a,r,v){
 let f=new FormData();
 f.append("action",a);
 f.append("rowIndex",r);
 f.append("value",v);
 f.append("sheet",SHEET);
 return f;
}

/* MODE UPDATE */
function mode(r,v){
 send(fd("mode",r,v));
}

/* LOAD */
async function loadData(){
 const res=await fetch(BASE_URL+"?sheet="+SHEET);
 allData=await res.json();

 tbody.innerHTML="";
 map.clear();

 allData.forEach(render);

 stats(allData);
 roomStats(allData);
}

/* FILTER */
function filterTable(){
 let q=search.value.toLowerCase();
 document.querySelectorAll("tbody tr").forEach(tr=>{
  tr.style.display=tr.innerText.toLowerCase().includes(q)?"":"none";
 });
}

/* COUNTDOWN */
setInterval(()=>{
 let s=new Date("2026-04-16").getTime();
 let n=Date.now();
 let d=Math.floor((s-n)/86400000);
 countdown.textContent=`STARTS IN ${d}D`;
},1000);

setInterval(loadData,60000);
loadData();

</script>

</body>
</html>
