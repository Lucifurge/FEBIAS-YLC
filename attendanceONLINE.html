<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Full Records</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background:#0f0f0f;
  color:#fff;
  margin:0;
  padding:1rem;
}

h1 {
  text-align:center;
  color:#ff6a00;
  font-size:1.3rem;
}

.table-wrap {
  overflow-x:auto;
}

table {
  width:100%;
  min-width:2200px; /* important for FULL columns */
  border-collapse:collapse;
}

th {
  background:#1a1a1a;
  color:#ff6a00;
  padding:10px;
  font-size:0.75rem;
  position:sticky;
  top:0;
}

td {
  border:1px solid #222;
  padding:6px;
  font-size:0.75rem;
  text-align:center;
  background:#121212;
  white-space:nowrap;
}

button {
  padding:8px 12px;
  margin:10px 0;
  border:none;
  background:linear-gradient(45deg,#ff6a00,#ff2e00);
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>YLC 2026 — FULL SHEET VIEW</h1>

<button onclick="loadData()">🔄 Refresh</button>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Last Name</th>
<th>First Name</th>
<th>Gender</th>
<th>Age</th>
<th>Number/Email</th>
<th>Church</th>
<th>Classification</th>
<th>Room</th>
<th>Payment Category</th>
<th>Amount</th>
<th>Payment Status</th>
<th>Attendance Status</th>
<th>Attended</th>
<th>Waiting</th>
<th>Cancelled</th>
<th>Shirt Size</th>
<th>Payment Indicator</th>
<th>Kit</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbwWmWuLWg-httkGe4-s7jXmKVftXBnGrN2dSoXhc5mQm7AbSRHj_5dH-pWtImuJHdIdDA/exec";
const SHEET_NAME = "Pre-Registration";

const tbody = document.querySelector("tbody");
let map = new Map();

const kitCycle = ["❌","🟠","✅"];

/* SORT A–Z */
function sortData(data){
  return data.sort((a,b)=>{
    return (a.lastName||"").localeCompare(b.lastName||"");
  });
}

/* RENDER FULL ROW */
function render(p){

  let tr = map.get(p.rowIndex);

  if(!tr){
    tr = document.createElement("tr");

    tr.innerHTML = `
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td></td>
      <td class="kit" style="cursor:pointer;"></td>
    `;

    tbody.appendChild(tr);
    map.set(p.rowIndex,tr);
  }

  const c = tr.children;

  c[0].textContent = p.sheetRow || "";
  c[1].textContent = (p.lastName || "") + ", " + (p.firstName || "");
  c[2].textContent = p.lastName || "";
  c[3].textContent = p.firstName || "";
  c[4].textContent = p.gender || "";
  c[5].textContent = p.age || "";
  c[6].textContent = p.numberEmail || "";
  c[7].textContent = p.church || "";
  c[8].textContent = p.classification || "";
  c[9].textContent = p.room || "";
  c[10].textContent = p.paymentCategory || "";
  c[11].textContent = p.amount || "";
  c[12].textContent = p.paymentStatus || "";
  c[13].textContent = p.attendanceStatus || "";

  c[14].textContent = p.attendedIcon || "";
  c[15].textContent = p.waitingIcon || "";
  c[16].textContent = p.cancelledIcon || "";

  c[17].textContent = p.shirtSize || "";
  c[18].textContent = p.paymentIndicator || "";

  let kit = p.kitDistribution || "❌";
  c[19].textContent = kit;

  // KIT TOGGLE
  c[19].onclick = async ()=>{

    let i = kitCycle.indexOf(kit);
    if(i === -1) i = 0;

    kit = kitCycle[(i+1)%kitCycle.length];
    c[19].textContent = kit;

    const fd = new FormData();
    fd.append("action","kit");
    fd.append("rowIndex",p.rowIndex);
    fd.append("kit_state",kit);
    fd.append("sheet",SHEET_NAME);

    await fetch(BASE_URL,{method:"POST",body:fd});
  };
}

/* LOAD */
async function loadData(){

  const res = await fetch(BASE_URL+"?sheet="+SHEET_NAME);
  const data = await res.json();

  if(!Array.isArray(data)) return;

  tbody.innerHTML = "";
  map.clear();

  const sorted = sortData(data);

  sorted.forEach(render);
}

loadData();

</script>

</body>
</html>
