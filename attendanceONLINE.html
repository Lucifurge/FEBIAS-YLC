<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="refine.ico">
<title>YLC 2026 Attendance System</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #0f0f0f;
  color: white;
  margin: 0;
  padding: 10px;
}

h1 { text-align: center; color: #ff6a00; }
.sub { text-align: center; color: #aaa; margin-bottom: 10px; }

.legend{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin:10px 0 20px;
}

.legend-box{
  background:#1a1a1a;
  border-left:4px solid #ff6a00;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

.stats{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.box{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  min-width:140px;
  text-align:center;
  border:1px solid #333;
}

.box span{ color:#ff6a00; font-weight:bold; }

.search{
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.search input{
  width:100%;
  max-width:400px;
  padding:10px;
  border-radius:8px;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
}

.table-wrap{ overflow-x:auto; }

table{
  width:100%;
  min-width:1800px;
  border-collapse:collapse;
}

th{
  background:#1a1a1a;
  color:#ff6a00;
  padding:10px;
  position:sticky;
  top:0;
}

td{
  padding:6px;
  border:1px solid #222;
  background:#121212;
  text-align:center;
  font-size:13px;
}

.clickable{
  cursor:pointer;
  font-size:18px;
}

button{
  width:100%;
  max-width:300px;
  margin:10px auto;
  display:block;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff6a00,#ff2e00);
  color:white;
  font-weight:bold;
}
select{
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:6px;
  padding:4px;
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE SYSTEM</h1>
<div class="sub">FEBIAS College of Bible System</div>

<div class="stats">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Paid<br><span id="paid">0</span></div>
  <div class="box">Waiting<br><span id="waiting">0</span></div>
  <div class="box">Countdown<br><span id="countdown">Loading...</span></div>
</div>

<div id="roomStats" style="margin:10px 0;background:#1a1a1a;padding:10px;border-radius:10px;"></div>

<button onclick="loadData()">🔄 REFRESH</button>

<div class="search">
  <input id="searchBox" placeholder="Search..." oninput="filterTable()" />
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th>#</th><th>Last</th><th>First</th><th>Gender</th><th>Age</th>
  <th>Contact</th><th>Church</th><th>Class</th>

  <th>Room</th>
  <th>ROOM_AC</th>

  <th>Payment Cat</th><th>Amount</th><th>Mode</th>

  <th>PAY</th><th>ATT</th>
  <th>✔</th><th>🟠</th><th>❌</th>

  <th>Shirt</th><th>Kit</th><th>Aircon</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbz2KwC7F750vELj7GgoAKxTxQqxsa_Gr6k78rGkUkyvRtilxisU3BYJGVce2Fn6J8pS/exec";
const SHEET = "Pre-Registration";

const AC_ROOMS = [
  "Berean Area",
  "Berean – Abraham 2",
  "Berean – Joshua 3",
  "Berean – Elijah 3",
  "Berean – Elisha 3",
  "Sharon – Deborah 2",
  "Sharon – Martha 3",
  "Sharon – Abigail 2",
  "Sharon – Eve 2"
];

const tbody = document.querySelector("tbody");

let map = new Map();
let allData = [];

/* stats */
function updateStats(data){
  let total=0, paid=0, waiting=0;

  data.forEach(p=>{
    total++;
    if(p.paymentIndicator==="PAID") paid++;
    if(p.paymentIndicator==="ON-WAITING PAYMENT") waiting++;
  });

  totalEl.textContent=total;
  paidEl.textContent=paid;
  waitingEl.textContent=waiting;
}

/* room stats */
function updateRoomStats(data){
  let html="<b>ROOM AC COUNT</b><br>";

  AC_ROOMS.forEach(r=>{
    let c=data.filter(x=>x.room_ac===r).length;
    html+=`${r}: ${c}<br>`;
  });

  document.getElementById("roomStats").innerHTML=html;
}

/* icons */
function payIcon(v){
  if(v==="PAID") return "✅ PAID";
  if(v==="ON-WAITING PAYMENT") return "🟠 WAITING";
  return "❌";
}

function attIcon(v){
  if(v==="Attended") return "✅";
  if(v==="ON-waiting") return "🟠";
  return "❌";
}

/* render */
function render(p){

  let tr=document.createElement("tr");

  tr.innerHTML=`
    <td>${p.rowIndex}</td>
    <td>${p.lastName}</td>
    <td>${p.firstName}</td>
    <td>${p.gender}</td>
    <td>${p.age}</td>
    <td>${p.contact}</td>
    <td>${p.church}</td>
    <td>${p.classification}</td>

    <td>${p.room}</td>

    <td>
      <select>
        ${AC_ROOMS.map(r=>`<option ${p.room_ac===r?"selected":""}>${r}</option>`)}
      </select>
    </td>

    <td>${p.paymentCategory}</td>
    <td>${p.amount}</td>
    <td>
      <select>
        <option ${p.modeOfPayment==="ONSITE"?"selected":""}>ONSITE</option>
        <option ${p.modeOfPayment==="ONLINE GCASH"?"selected":""}>ONLINE GCASH</option>
        <option ${p.modeOfPayment==="ONLINE BANK"?"selected":""}>ONLINE BANK</option>
      </select>
    </td>

    <td class="clickable">${payIcon(p.paymentIndicator)}</td>
    <td class="clickable">${attIcon(p.attendanceStatus)}</td>

    <td>${p.attendedIcon||""}</td>
    <td>${p.waitingIcon||""}</td>
    <td>${p.cancelledIcon||""}</td>

    <td>
      <select>
        <option>XS</option><option>S</option><option>M</option>
        <option>L</option><option>XL</option><option>XXL</option>
      </select>
    </td>

    <td class="clickable">${p.kit}</td>
    <td class="clickable">${p.aircon}</td>
  `;

  /* ROOM_AC */
  tr.children[9].querySelector("select").onchange=(e)=>{
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"room_ac",rowIndex:p.rowIndex,value:e.target.value,sheet:SHEET
    })});
    p.room_ac=e.target.value;
    updateRoomStats(allData);
  };

  /* MODE */
  tr.children[11].querySelector("select").onchange=(e)=>{
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"mode",rowIndex:p.rowIndex,value:e.target.value,sheet:SHEET
    })});
  };

  /* PAYMENT */
  tr.children[13].onclick=()=>{
    let next=p.paymentIndicator==="PAID"?"NOT PAID":"PAID";
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"payment",rowIndex:p.rowIndex,value:next,sheet:SHEET
    })});
    p.paymentIndicator=next;
    tr.children[13].textContent=payIcon(next);
    updateStats(allData);
  };

  /* ATTENDANCE */
  tr.children[14].onclick=()=>{
    let next=p.attendanceStatus==="Attended"?"Cancelled":"Attended";
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"attendance",rowIndex:p.rowIndex,status:next,sheet:SHEET
    })});
    p.attendanceStatus=next;
    tr.children[14].textContent=attIcon(next);
  };

  /* SHIRT */
  tr.children[17].querySelector("select").value=p.shirt||"";
  tr.children[17].querySelector("select").onchange=(e)=>{
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"shirt",rowIndex:p.rowIndex,value:e.target.value,sheet:SHEET
    })});
  };

  /* KIT */
  tr.children[18].onclick=()=>{
    let next=p.kit==="❌"?"🟠":p.kit==="🟠"?"✅":"❌";
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"kit",rowIndex:p.rowIndex,state:next,sheet:SHEET
    })});
    p.kit=next;
    tr.children[18].textContent=next;
  };

  /* AIRCON */
  tr.children[19].onclick=()=>{
    let next=p.aircon==="❌"?"🟠":p.aircon==="🟠"?"✅":"❌";
    fetch(BASE_URL,{method:"POST",body:new URLSearchParams({
      action:"aircon",rowIndex:p.rowIndex,state:next,sheet:SHEET
    })});
    p.aircon=next;
    tr.children[19].textContent=next;
  };

  tbody.appendChild(tr);
}

/* LOAD */
async function loadData(){
  let res=await fetch(BASE_URL+"?sheet="+SHEET);
  allData=await res.json();

  tbody.innerHTML="";
  allData.forEach(render);

  updateStats(allData);
  updateRoomStats(allData);
}

/* filter */
function filterTable(){
  let q=searchBox.value.toLowerCase();
  document.querySelectorAll("tbody tr").forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(q)?"":"none";
  });
}

/* countdown */
setInterval(()=>{
  let now=Date.now();
  let start=new Date("2026-04-16").getTime();
  let end=new Date("2026-04-18").getTime();
  let t=now<start?start:end;

  let d=Math.floor((t-now)/86400000);
  let h=Math.floor((t-now)/3600000)%24;

  countdown.textContent=now<start?
  `STARTS IN ${d}D ${h}H`:`ENDS IN ${d}D ${h}H`;
},1000);

loadData();

</script>
</body>
</html>
