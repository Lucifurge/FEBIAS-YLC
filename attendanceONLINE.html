<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLC 2026 Attendance Online</title>

<link rel="icon" href="logo.ico">

<style>
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: #0f0f0f;
  color: #fff;
  padding: 1rem;
  margin: 0;
}

h1 { text-align:center; color:#ff6a00; font-size:1.3rem; }
.sub { text-align:center; color:#bbb; font-size:0.85rem; }

.stats {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin:15px 0;
}

.box {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  border:1px solid #333;
  flex:1 1 120px;
  text-align:center;
  font-size:0.85rem;
}

.box span { color:#ff6a00; font-weight:bold; }

button {
  width:100%;
  max-width:320px;
  margin:10px auto;
  display:block;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  background:linear-gradient(45deg,#ff6a00,#ff2e00);
  color:#fff;
}

.table-wrap { width:100%; overflow-x:auto; }

table {
  width:100%;
  min-width:650px;
  border-collapse:collapse;
  margin-top:10px;
}

th {
  background:#1a1a1a;
  color:#ff6a00;
  padding:10px;
}

td {
  border:1px solid #222;
  padding:8px;
  text-align:center;
  background:#121212;
}

.kit { cursor:pointer; font-size:1.2rem; }

/* MOBILE */
@media(max-width:600px){
  table,thead{display:none;}
  tbody{display:block;}

  tr{
    display:block;
    background:#121212;
    margin-bottom:10px;
    border-radius:10px;
    padding:10px;
    border:1px solid #222;
  }

  td{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border:none;
    font-size:0.85rem;
  }

  td::before{
    content:attr(data-label);
    color:#aaa;
  }
}
</style>
</head>

<body>

<h1>YLC 2026 ATTENDANCE ONLINE</h1>
<div class="sub">FEBIAS College of Bible System</div>

<!-- STATS -->
<div class="stats">
  <div class="box">Total<br><span id="totalCount">0</span></div>
  <div class="box">Paid<br><span id="paidCount">0</span></div>
  <div class="box">Pending<br><span id="pendingCount">0</span></div>
  <div class="box">Countdown<br><span id="countdown">Loading...</span></div>
</div>

<button onclick="loadAttendance()">🔥 REFRESH</button>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>First Name</th>
<th>Last Name</th>
<th>Payment</th>
<th>Attendance</th>
<th>Kit</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbwWmWuLWg-httkGe4-s7jXmKVftXBnGrN2dSoXhc5mQm7AbSRHj_5dH-pWtImuJHdIdDA/exec";
const SHEET_NAME = "Pre-Registration";

const tbody = document.querySelector("tbody");
let peopleMap = new Map();

const kitCycle = ["❌","🟠","✅"];

/* STATS */
function updateStats(data){

  let paid = 0;
  let pending = 0;

  data.forEach(p=>{
    const pay = (p.paymentIndicator || "").toUpperCase();
    if(pay === "PAID") paid++;
    else pending++;
  });

  document.getElementById("totalCount").textContent = data.length;
  document.getElementById("paidCount").textContent = paid;
  document.getElementById("pendingCount").textContent = pending;
}

/* COUNTDOWN */
function startCountdown(){
  const start = new Date("2026-04-16T00:00:00").getTime();
  const end = new Date("2026-04-18T23:59:59").getTime();

  setInterval(()=>{

    const now = Date.now();

    let target, label;

    if(now < start){
      target = start;
      label = "STARTS IN";
    } else if(now <= end){
      target = end;
      label = "ENDS IN";
    } else {
      document.getElementById("countdown").textContent = "DONE";
      return;
    }

    const diff = target - now;

    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff/3600000)%24);
    const m = Math.floor((diff/60000)%60);
    const s = Math.floor((diff/1000)%60);

    document.getElementById("countdown").textContent =
      `${label}: ${d}d ${h}h ${m}m ${s}s`;

  },1000);
}

/* SORT A–Z LAST NAME */
function sortData(data){
  return data.sort((a,b)=>{
    return (a.lastName||"").localeCompare(b.lastName||"");
  });
}

/* RENDER */
function renderRow(p){

  let tr = peopleMap.get(p.rowIndex);

  if(!tr){
    tr = document.createElement("tr");

    tr.innerHTML = `
      <td data-label="First Name"></td>
      <td data-label="Last Name"></td>
      <td data-label="Payment"></td>
      <td data-label="Attendance"></td>
      <td data-label="Kit" class="kit"></td>
    `;

    tbody.appendChild(tr);
    peopleMap.set(p.rowIndex,tr);
  }

  tr.children[0].textContent = p.firstName || "";
  tr.children[1].textContent = p.lastName || "";

  const pay = (p.paymentIndicator || "").toUpperCase();

  tr.children[2].textContent =
    pay === "PAID" ? "✅" :
    pay === "ON-WAITING PAYMENT" ? "🟠" : "❌";

  tr.children[3].textContent =
    p.attendanceStatus === "Attended" ? "✅" :
    p.attendanceStatus === "Cancelled" ? "❌" : "🟠";

  let kitState = p.kitDistribution || "❌";
  const kitCell = tr.children[4];

  kitCell.textContent = kitState;

  kitCell.onclick = async ()=>{

    let i = kitCycle.indexOf(kitState);
    if(i === -1) i = 0;

    kitState = kitCycle[(i+1)%kitCycle.length];
    kitCell.textContent = kitState;

    const fd = new FormData();
    fd.append("action","kit");
    fd.append("rowIndex",p.rowIndex);
    fd.append("kit_state",kitState);
    fd.append("sheet",SHEET_NAME);

    await fetch(BASE_URL,{method:"POST",body:fd});
  };
}

/* LOAD */
async function loadAttendance(){

  const res = await fetch(BASE_URL+"?sheet="+SHEET_NAME);
  const data = await res.json();

  if(!Array.isArray(data)) return;

  tbody.innerHTML = "";
  peopleMap.clear();

  const sorted = sortData(data);

  updateStats(sorted);
  sorted.forEach(renderRow);
}

document.querySelector("button").onclick = loadAttendance;

setInterval(loadAttendance,15000);

loadAttendance();
startCountdown();

</script>

</body>
</html>
